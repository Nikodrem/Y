<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>🎰 Fortune Lust — Колесо Судьбы</title>
  <style>
    :root {
      --bg: #1a0b1c;
      --gold: #d4af37;
      --gold2: #b8922e;
      --accent: #c2185b;
      --text: #f5e9d8;
      --surface: rgba(30, 15, 30, 0.9);
      --radius: 24px;
      --shadow: 0 0 30px rgba(212, 175, 55, 0.5);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: radial-gradient(circle at 30% 20%, #2a1a3a, #0c0612);
      color: var(--text);
      font-family: 'Playfair Display', 'Georgia', serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      user-select: none;
      -webkit-user-select: none;
    }
    .container {
      width: 100%;
      max-width: 700px;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
    }
    .title {
      font-size: 2.8rem;
      font-weight: 700;
      text-align: center;
      letter-spacing: 3px;
      background: linear-gradient(180deg, #f9d976, #e2b63d, #b27f1c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.7));
      text-shadow: 0 0 10px rgba(212,175,55,0.8);
    }
    .subtitle {
      font-size: 1rem;
      color: #cbb06b;
      text-align: center;
      margin-top: -1rem;
      letter-spacing: 2px;
    }

    /* Колесо фортуны */
    .wheel-container {
      position: relative;
      width: 300px;
      height: 300px;
      margin: 0 auto;
    }
    .wheel {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: conic-gradient(
        #c2185b 0deg 60deg,
        #d4af37 60deg 120deg,
        #6a1b9a 120deg 180deg,
        #b8922e 180deg 240deg,
        #8e24aa 240deg 300deg,
        #c2185b 300deg 360deg
      );
      box-shadow: 0 0 0 4px var(--gold), 0 0 30px rgba(212,175,55,0.8), inset 0 0 20px rgba(0,0,0,0.5);
      position: relative;
      transition: transform 3.5s cubic-bezier(0.17, 0.67, 0.12, 0.99);
    }
    .wheel.spinning {
      transform: rotate(0deg);
    }
    .wheel-pointer {
      position: absolute;
      top: -15px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 20px solid transparent;
      border-right: 20px solid transparent;
      border-top: 30px solid #f9d976;
      filter: drop-shadow(0 0 6px rgba(212,175,55,0.9));
      z-index: 5;
    }
    .wheel-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%,-50%);
      width: 60px;
      height: 60px;
      background: radial-gradient(circle, #f9d976, #b27f1c);
      border-radius: 50%;
      box-shadow: 0 0 15px gold, inset 0 0 10px rgba(0,0,0,0.6);
      border: 3px solid #fff;
      z-index: 2;
    }
    .spin-btn {
      margin-top: 1rem;
      background: linear-gradient(to bottom, #f9d976, #b27f1c);
      border: none;
      padding: 1rem 3rem;
      border-radius: 50px;
      font-size: 1.4rem;
      font-weight: bold;
      color: #2a1a3a;
      letter-spacing: 1px;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(212,175,55,0.7), 0 4px 12px rgba(0,0,0,0.6);
      transition: 0.2s;
      text-transform: uppercase;
    }
    .spin-btn:hover {
      background: linear-gradient(to bottom, #ffea8c, #d4af37);
      box-shadow: 0 0 30px rgba(255,215,0,1);
      transform: scale(1.05);
    }
    .spin-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* Сектора колеса (метки) */
    .sector-labels {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      pointer-events: none;
      font-weight: bold;
      font-size: 0.8rem;
      color: white;
      text-shadow: 0 1px 2px black;
    }
    .sector-label {
      position: absolute;
      left: 50%;
      top: 50%;
      transform-origin: 0 0;
    }

    /* Контент после остановки */
    .result-card {
      background: var(--surface);
      backdrop-filter: blur(12px);
      border: 2px solid var(--gold);
      border-radius: var(--radius);
      padding: 1.5rem;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 0 30px rgba(212,175,55,0.5);
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      animation: fadeIn 0.6s ease;
    }
    @keyframes fadeIn {
      from { opacity:0; transform: translateY(20px); }
      to { opacity:1; transform: translateY(0); }
    }
    .result-media {
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      background: #000;
    }
    .result-media img, .result-media video {
      width: 100%;
      max-height: 60vh;
      object-fit: contain;
      display: block;
    }
    .result-title {
      font-size: 1rem;
      font-weight: 500;
      color: var(--gold);
      text-align: center;
    }
    .action-row {
      display: flex;
      gap: 0.8rem;
    }
    .action-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid var(--gold);
      color: var(--text);
      padding: 0.5rem 1.2rem;
      border-radius: 20px;
      cursor: pointer;
      transition: 0.3s;
      font-size: 0.9rem;
    }
    .action-btn:hover {
      background: var(--gold);
      color: #000;
    }
    .loading-spinner {
      display: none;
      text-align: center;
      color: var(--gold);
      margin: 1rem;
    }
  </style>
</head>
<body>
<div class="container">
  <h1 class="title">🎰 Fortune Lust</h1>
  <p class="subtitle">Испытай судьбу — крути колесо!</p>

  <div class="wheel-container">
    <div class="wheel-pointer"></div>
    <div class="wheel" id="wheel"></div>
    <div class="wheel-center"></div>
  </div>

  <button class="spin-btn" id="spinBtn">Крутить 🎲</button>

  <div class="loading-spinner" id="loading">✨ Загрузка дара судьбы...</div>

  <div class="result-card" id="resultCard">
    <div class="result-media" id="resultMedia"></div>
    <div class="result-title" id="resultTitle"></div>
    <div class="action-row">
      <button class="action-btn" id="downloadResultBtn">⬇️ Сохранить</button>
      <button class="action-btn" id="spinAgainBtn">🔄 Ещё раз</button>
    </div>
  </div>
</div>

<script>
(() => {
  // ================== Конфигурация ==================
  const CATEGORIES = [
    { name: 'Портреты', subs: ['gentlemanboners','classysexy','PrettyGirlsNSFW','TotalBabes'], color: '#c2185b' },
    { name: 'Арт', subs: ['ArtGW','Boudoir','FineArtNudes','ElegantNudes'], color: '#d4af37' },
    { name: 'Эротика', subs: ['GoneWild','RealGirls','PetiteGoneWild','onoff'], color: '#6a1b9a' },
    { name: 'Видео', subs: ['60fpsporn','porninfifteenseconds','nsfw_gif','cumsluts'], color: '#b8922e' },
    { name: 'Сюрприз', subs: ['milf','AsiansGoneWild','holdthemoan','lingerie'], color: '#8e24aa' },
    { name: 'Бонус', subs: ['AltGirls','gothsluts','redhead','Blonde'], color: '#c2185b' }
  ];
  const SECTOR_COUNT = CATEGORIES.length;
  const SEGMENT_DEG = 360 / SECTOR_COUNT;

  const BLOCKLIST = /(gore|blood|murder|death|kill|violen|убийств|смерт|насил|труп|femboy|trap|trans|shemale|фембой|транс)/i;
  const STORAGE_KEY = 'fortune_lust_seen';
  let seenPosts = new Set();
  let seenUrls = new Set();
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) {
      const s = JSON.parse(raw);
      if(s.posts) seenPosts = new Set(s.posts);
      if(s.urls) seenUrls = new Set(s.urls);
    }
  } catch(e){}

  function saveSeen() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      posts: Array.from(seenPosts).slice(-1000),
      urls: Array.from(seenUrls).slice(-1000)
    }));
  }

  // ================== Элементы DOM ==================
  const wheel = document.getElementById('wheel');
  const spinBtn = document.getElementById('spinBtn');
  const resultCard = document.getElementById('resultCard');
  const resultMedia = document.getElementById('resultMedia');
  const resultTitle = document.getElementById('resultTitle');
  const loadingEl = document.getElementById('loading');
  const downloadBtn = document.getElementById('downloadResultBtn');
  const spinAgainBtn = document.getElementById('spinAgainBtn');

  let isSpinning = false;
  let currentMediaUrl = null;
  let currentResultPost = null;

  // ================== JSONP запросы ==================
  function jsonp(url, cb, timeout=8000) {
    return new Promise((resolve, reject) => {
      const bases = ['https://www.reddit.com','https://old.reddit.com'];
      let attempt = 0;
      const tryLoad = () => {
        if(attempt >= bases.length) return reject(new Error('JSONP fail'));
        const base = bases[attempt];
        const script = document.createElement('script');
        const full = base + url + (url.includes('?')?'&':'?')+'jsonp='+cb+'&_='+Date.now();
        const timer = setTimeout(() => { cleanup(); attempt++; tryLoad(); }, timeout);
        function cleanup() { clearTimeout(timer); delete window[cb]; if(script.parentNode) script.parentNode.removeChild(script); }
        window[cb] = (data) => { cleanup(); resolve(data); };
        script.onerror = () => { cleanup(); attempt++; tryLoad(); };
        script.src = full;
        document.head.appendChild(script);
      };
      tryLoad();
    });
  }

  async function fetchRandomPostFromSub(sub) {
    const data = await jsonp(`/r/${sub}/hot.json?limit=10`, 'fortuneCB');
    const posts = data.data.children;
    // Фильтруем
    const valid = posts.filter(p => {
      const d = p.data;
      if(!d || d.stickied) return false;
      if(seenPosts.has(d.id) || (d.url && seenUrls.has(d.url))) return false;
      if(BLOCKLIST.test(d.title+' '+d.subreddit)) return false;
      return true;
    });
    if(valid.length === 0) return null;
    const post = valid[Math.floor(Math.random() * valid.length)].data;
    // Отмечаем как просмотренное
    seenPosts.add(post.id);
    if(post.url) seenUrls.add(post.url);
    saveSeen();
    // Определяем медиа
    let mediaType = 'image', mediaUrl = post.url, poster = null;
    if(post.is_video && post.media?.reddit_video?.fallback_url) {
      mediaType = 'video';
      mediaUrl = post.media.reddit_video.fallback_url;
      poster = (post.thumbnail && post.thumbnail !== 'self') ? post.thumbnail : '';
    } else if(post.domain === 'redgifs.com') {
      const m = post.url.match(/\/watch\/([a-zA-Z0-9]+)/);
      if(m) {
        mediaType = 'iframe';
        mediaUrl = `https://www.redgifs.com/ifr/${m[1]}`;
      }
    } else if(post.url?.match(/\.(mp4|webm|mov)$/i) || post.url?.endsWith('.gifv')) {
      mediaType = 'video';
      mediaUrl = post.url.replace('.gifv','.mp4');
    } else if(post.url?.match(/\.(jpg|jpeg|png|gif|webp)$/i) || post.domain === 'i.redd.it' || post.domain === 'i.imgur.com') {
      mediaType = 'image';
    } else return null;
    return { title: post.title, mediaType, mediaUrl, poster, id: post.id, subreddit: post.subreddit };
  }

  // ================== Логика колеса ==================
  function getSectorIndex(degrees) {
    // Угол 0 - верх, по часовой стрелке (у нас conic-gradient начинается с 0 сверху)
    let normalized = (degrees % 360 + 360) % 360;
    let index = Math.floor(normalized / SEGMENT_DEG);
    return Math.min(index, SECTOR_COUNT-1);
  }

  async function spinWheel() {
    if(isSpinning) return;
    isSpinning = true;
    spinBtn.disabled = true;
    resultCard.style.display = 'none';
    loadingEl.style.display = 'none';

    // Случайное количество оборотов + точное попадание на сектор
    const targetSector = Math.floor(Math.random() * SECTOR_COUNT);
    const targetAngle = 360 * 5 + targetSector * SEGMENT_DEG + SEGMENT_DEG/2 + Math.random()*20;
    // Устанавливаем начальный угол и запускаем анимацию
    wheel.style.transition = 'transform 3.5s cubic-bezier(0.17, 0.67, 0.12, 0.99)';
    wheel.style.transform = `rotate(${targetAngle}deg)`;

    // Ждем окончания анимации
    setTimeout(async () => {
      const computedStyle = window.getComputedStyle(wheel);
      const matrix = new DOMMatrixReadOnly(computedStyle.transform);
      const angle = Math.atan2(matrix.b, matrix.a) * (180/Math.PI); // это угол поворота
      let degrees = angle < 0 ? angle + 360 : angle;
      const sectorIndex = getSectorIndex(degrees);
      console.log('Stop at', degrees, 'sector', sectorIndex, CATEGORIES[sectorIndex].name);

      // Загружаем контент для сектора
      loadingEl.style.display = 'block';
      resultCard.style.display = 'none';

      const category = CATEGORIES[sectorIndex];
      const sub = category.subs[Math.floor(Math.random() * category.subs.length)];
      try {
        const post = await fetchRandomPostFromSub(sub);
        if(post) {
          currentResultPost = post;
          currentMediaUrl = post.mediaUrl;
          displayResult(post);
        } else {
          // fallback
          resultTitle.textContent = 'Повезет в другой раз...';
          resultMedia.innerHTML = '<p style="color:white;">Нет контента</p>';
          resultCard.style.display = 'flex';
        }
      } catch(e) {
        resultTitle.textContent = 'Ошибка загрузки';
        resultMedia.innerHTML = '<p>Попробуйте еще раз</p>';
        resultCard.style.display = 'flex';
      }
      loadingEl.style.display = 'none';
      spinBtn.disabled = false;
      isSpinning = false;
    }, 3600);
  }

  function displayResult(post) {
    resultMedia.innerHTML = '';
    resultTitle.textContent = post.title || 'Без названия';
    if(post.mediaType === 'image') {
      const img = document.createElement('img');
      img.src = post.mediaUrl;
      img.loading = 'lazy';
      resultMedia.appendChild(img);
    } else if(post.mediaType === 'video') {
      const video = document.createElement('video');
      video.src = post.mediaUrl;
      if(post.poster) video.poster = post.poster;
      video.controls = true;
      video.autoplay = true;
      video.playsInline = true;
      resultMedia.appendChild(video);
    } else if(post.mediaType === 'iframe') {
      const iframe = document.createElement('iframe');
      iframe.src = post.mediaUrl;
      iframe.allowFullscreen = true;
      iframe.width = '100%';
      iframe.height = '400';
      resultMedia.appendChild(iframe);
    }
    resultCard.style.display = 'flex';
  }

  // ================== Обработчики кнопок ==================
  spinBtn.addEventListener('click', spinWheel);
  spinAgainBtn.addEventListener('click', () => {
    resultCard.style.display = 'none';
    spinWheel();
  });
  downloadBtn.addEventListener('click', () => {
    if(currentResultPost && currentMediaUrl) {
      const a = document.createElement('a');
      a.href = currentMediaUrl;
      a.download = 'fortune_'+Date.now()+'.jpg';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }
  });

  // Добавляем метки секторов (визуально)
  function createSectorLabels() {
    const container = document.createElement('div');
    container.className = 'sector-labels';
    for(let i=0; i<SECTOR_COUNT; i++) {
      const label = document.createElement('div');
      label.className = 'sector-label';
      label.textContent = CATEGORIES[i].name;
      const angle = i * SEGMENT_DEG + SEGMENT_DEG/2;
      const rad = (angle - 90) * Math.PI / 180;
      const radius = 100; // примерно половина радиуса колеса
      const x = Math.cos(rad) * radius;
      const y = Math.sin(rad) * radius;
      label.style.transform = `translate(${x}px, ${y}px) rotate(${angle}deg)`;
      container.appendChild(label);
    }
    const wheelContainer = document.querySelector('.wheel-container');
    wheelContainer.appendChild(container);
  }
  createSectorLabels();
})();
</script>
</body>
</html>
