<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🔥 VibeFlow — новый формат</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overscroll-behavior: none;
      overflow: hidden;
      touch-action: pan-y;
      user-select: none;
      -webkit-user-select: none;
    }
    .app {
      width: 100vw;
      height: 100vh;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .feed-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    .card-stack {
      position: absolute;
      top:0; left:0; width:100%; height:100%;
    }
    .card {
      position: absolute;
      top:0; left:0; width:100%; height:100%;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      will-change: transform;
    }
    .card.swiping { transition: none; }
    .card img, .card video, .card iframe {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }
    .card-info {
      position: absolute;
      bottom: 0;
      left:0; right:0;
      padding: 1rem 1rem 2rem;
      background: linear-gradient(transparent, rgba(0,0,0,0.8));
      color: #fff;
      pointer-events: none;
    }
    .card-title {
      font-size: 1rem; font-weight: 600; margin-bottom: 0.4rem;
      text-shadow: 0 1px 3px rgba(0,0,0,0.7);
      display: -webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
    }
    .card-subreddit {
      font-size: 0.8rem; opacity: 0.8; display: flex; align-items: center; gap: 0.3rem;
    }

    .action-bar {
      position: absolute; right: 12px; bottom: 120px;
      display: flex; flex-direction: column; gap: 1.2rem; align-items: center;
      z-index: 5;
    }
    .action-item {
      display: flex; flex-direction: column; align-items: center; gap: 0.2rem;
    }
    .action-btn {
      width: 48px; height: 48px; border-radius: 50%;
      background: rgba(0,0,0,0.4); backdrop-filter: blur(10px);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; color: white; border: 1px solid rgba(255,255,255,0.2);
      cursor: pointer; transition: 0.2s; -webkit-tap-highlight-color: transparent;
    }
    .action-btn:active { transform: scale(0.9); background: rgba(255,255,255,0.2); }
    .action-count { font-size: 0.75rem; color: white; text-shadow: 0 1px 2px black; }
    .like-btn.liked { background: #e74c3c; border-color: #e74c3c; }
    .dislike-btn.disliked { background: #3498db; border-color: #3498db; }

    .top-bar {
      position: absolute; top:0; left:0; right:0; padding: 1rem;
      display: flex; justify-content: space-between; z-index: 10;
      background: linear-gradient(rgba(0,0,0,0.6), transparent);
      pointer-events: none;
    }
    .top-bar > * { pointer-events: auto; }
    .mode-tabs {
      display: flex; gap: 0.5rem; background: rgba(0,0,0,0.5);
      backdrop-filter: blur(10px); border-radius: 30px; padding: 0.3rem;
    }
    .mode-tab {
      padding: 0.4rem 1.2rem; border-radius: 20px; font-weight: 600;
      font-size: 0.8rem; color: #ccc; background: transparent; border: none; cursor: pointer;
    }
    .mode-tab.active { background: #fff; color: #000; }

    .xp-bar {
      position: absolute; top: 0; left: 0; height: 3px; background: #e74c3c;
      transition: width 0.5s; z-index: 15;
    }

    .nav-bottom {
      position: absolute; bottom: 0; left:0; right:0;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(20px);
      display: flex; justify-content: space-around; padding: 0.5rem 0;
      border-top: 1px solid rgba(255,255,255,0.1); z-index: 10;
    }
    .nav-btn {
      background: none; border: none; color: #aaa; font-size: 0.7rem;
      display: flex; flex-direction: column; align-items: center; gap: 0.2rem;
      cursor: pointer; font-weight: 500;
    }
    .nav-btn.active { color: #fff; }
    .nav-btn span { font-size: 1.4rem; }

    .loader {
      position: absolute; top:50%; left:50%; transform: translate(-50%,-50%);
      color: #fff; font-size: 1rem; z-index: 20;
    }
  </style>
</head>
<body>
<div class="app">
  <div class="xp-bar" id="xpBar" style="width:0%"></div>
  <div class="feed-container" id="feedContainer">
    <div class="card-stack" id="cardStack"></div>
    <div class="loader" id="loader">⏳</div>
  </div>

  <!-- Верхняя панель -->
  <div class="top-bar">
    <div class="mode-tabs">
      <button class="mode-tab active" data-mode="mixed">🔥 Для вас</button>
      <button class="mode-tab" data-mode="following">⭐ Подписки</button>
    </div>
    <button style="background:rgba(255,255,255,0.2); border:none; color:white; padding:0.3rem 1rem; border-radius:20px; font-size:0.8rem;" id="searchBtn">🔍</button>
  </div>

  <!-- Боковая панель действий -->
  <div class="action-bar" id="actionBar">
    <div class="action-item">
      <button class="action-btn like-btn" id="likeBtn">❤️</button>
      <span class="action-count" id="likeCount">0</span>
    </div>
    <div class="action-item">
      <button class="action-btn dislike-btn" id="dislikeBtn">💔</button>
      <span class="action-count" id="dislikeCount">0</span>
    </div>
    <div class="action-item">
      <button class="action-btn" id="saveBtn">🔖</button>
    </div>
    <div class="action-item">
      <button class="action-btn" id="shareBtn">↗️</button>
    </div>
  </div>

  <!-- Нижняя навигация -->
  <div class="nav-bottom">
    <button class="nav-btn active" data-page="feed"><span>🏠</span>Лента</button>
    <button class="nav-btn" data-page="explore"><span>🔎</span>Обзор</button>
    <button class="nav-btn" data-page="bookmarks"><span>🔖</span>Избранное</button>
    <button class="nav-btn" data-page="profile"><span>👤</span>Профиль</button>
  </div>
</div>

<script>
(() => {
  // ========== Состояние ==========
  const SUBREDDITS = [
    'GoneWild','RealGirls','PetiteGoneWild','AltGirls','gothsluts','redhead','Blonde',
    'gentlemanboners','classysexy','ArtGW','Boudoir','FineArtNudes',
    'Amateur','gwpublic','holdthemoan','onoff','porn','nsfw','cumsluts','anal','blowjobs',
    '60fpsporn','porninfifteenseconds','nsfw_gif','adultgifs','milf','AsiansGoneWild'
  ];

  const BLOCKLIST = /(gore|blood|murder|death|kill|violen|убийств|смерт|насил|труп|femboy|trap|trans|shemale|фембой|транс)/i;

  const state = {
    seenPosts: new Set(),
    seenUrls: new Set(),
    bookmarks: [],
    likes: {},
    xp: 0,
    currentIndex: 0,
    cards: [],
    mode: 'mixed', // mixed | following (подписки на сабреддиты)
    followingSubs: new Set(),
  };

  try {
    const raw = localStorage.getItem('vibeflow_state');
    if(raw) {
      const s = JSON.parse(raw);
      state.bookmarks = s.bookmarks || [];
      state.likes = s.likes || {};
      if(s.seenPosts) state.seenPosts = new Set(s.seenPosts);
      if(s.seenUrls) state.seenUrls = new Set(s.seenUrls);
      if(s.followingSubs) state.followingSubs = new Set(s.followingSubs);
      state.xp = s.xp || 0;
    }
  } catch(e){}

  function saveState() {
    const toSave = {
      bookmarks: state.bookmarks,
      likes: state.likes,
      seenPosts: Array.from(state.seenPosts).slice(-2000),
      seenUrls: Array.from(state.seenUrls).slice(-2000),
      followingSubs: Array.from(state.followingSubs),
      xp: state.xp,
    };
    localStorage.setItem('vibeflow_state', JSON.stringify(toSave));
  }

  // ========== JSONP ==========
  function jsonp(url, cb, timeout=8000) {
    return new Promise((resolve, reject) => {
      const bases = ['https://www.reddit.com', 'https://old.reddit.com'];
      let attempt = 0;
      const tryLoad = () => {
        if(attempt >= bases.length) return reject(new Error('JSONP fail'));
        const base = bases[attempt];
        const script = document.createElement('script');
        const full = base + url + (url.includes('?')?'&':'?') + 'jsonp=' + cb + '&_=' + Date.now();
        const timer = setTimeout(() => { cleanup(); attempt++; tryLoad(); }, timeout);
        function cleanup() { clearTimeout(timer); delete window[cb]; if(script.parentNode) script.parentNode.removeChild(script); }
        window[cb] = (data) => { cleanup(); resolve(data); };
        script.onerror = () => { cleanup(); attempt++; tryLoad(); };
        script.src = full;
        document.head.appendChild(script);
      };
      tryLoad();
    });
  }

  async function fetchPosts(sub, limit=5) {
    const data = await jsonp(`/r/${sub}/hot.json?limit=${limit}`, 'feedCB');
    return data.data.children;
  }

  // ========== Создание карточки ==========
  function createCardElement(post) {
    const data = post.data;
    if(!data || data.stickied) return null;
    if(state.seenPosts.has(data.id) || (data.url && state.seenUrls.has(data.url))) return null;
    if(BLOCKLIST.test(data.title+' '+data.subreddit)) return null;

    state.seenPosts.add(data.id);
    if(data.url) state.seenUrls.add(data.url);

    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.postId = data.id;
    card.dataset.subreddit = data.subreddit;
    card.dataset.likes = state.likes[data.id]?.likes || 0;
    card.dataset.dislikes = state.likes[data.id]?.dislikes || 0;

    let mediaEl;
    if(data.is_video && data.media?.reddit_video?.fallback_url) {
      mediaEl = document.createElement('video');
      mediaEl.src = data.media.reddit_video.fallback_url;
      mediaEl.controls = false;
      mediaEl.loop = true;
      mediaEl.muted = true;
      mediaEl.playsInline = true;
      mediaEl.setAttribute('playsinline', '');
      mediaEl.preload = 'metadata';
      if(data.thumbnail && data.thumbnail !== 'self') mediaEl.poster = data.thumbnail;
    } else if(data.domain === 'redgifs.com') {
      const match = data.url.match(/\/watch\/([a-zA-Z0-9]+)/);
      if(match) {
        mediaEl = document.createElement('iframe');
        mediaEl.src = `https://www.redgifs.com/ifr/${match[1]}`;
        mediaEl.allowFullscreen = true;
        mediaEl.allow = 'autoplay; fullscreen';
      }
    } else if(data.url?.match(/\.(jpg|jpeg|png|gif|webp)$/i) || data.domain === 'i.redd.it' || data.domain === 'i.imgur.com') {
      mediaEl = document.createElement('img');
      mediaEl.src = data.url;
    } else if(data.url?.match(/\.(mp4|webm|mov)$/i) || data.url?.endsWith('.gifv')) {
      mediaEl = document.createElement('video');
      mediaEl.src = data.url.replace(/\.gifv$/, '.mp4');
      mediaEl.controls = false;
      mediaEl.loop = true;
      mediaEl.muted = true;
      mediaEl.playsInline = true;
      mediaEl.setAttribute('playsinline', '');
    } else {
      return null;
    }

    card.appendChild(mediaEl);

    const info = document.createElement('div');
    info.className = 'card-info';
    info.innerHTML = `
      <div class="card-title">${data.title || ''}</div>
      <div class="card-subreddit"><span>🔴</span> r/${data.subreddit}</div>
    `;
    card.appendChild(info);

    return card;
  }

  // ========== Логика свайпов ==========
  let startY = 0;
  let currentY = 0;
  let swiping = false;
  const stack = document.getElementById('cardStack');
  const feedContainer = document.getElementById('feedContainer');

  function updateStack() {
    const cards = stack.children;
    for(let i = 0; i < cards.length; i++) {
      const card = cards[i];
      card.style.transform = `translateY(${(i - state.currentIndex) * 100}%)`;
      card.style.transition = 'transform 0.3s ease';
      card.classList.remove('swiping');

      // Воспроизведение видео при активной карточке
      const video = card.querySelector('video');
      if(video) {
        if(i === state.currentIndex) video.play().catch(()=>{});
        else { video.pause(); video.currentTime = 0; }
      }
      // Остановка iframe (RedGIFs)
      const iframe = card.querySelector('iframe');
      if(iframe && i !== state.currentIndex) {
        iframe.src = iframe.src; // перезагрузка для остановки
      }
    }
    updateActionBar();
  }

  function updateActionBar() {
    const currentCard = stack.children[state.currentIndex];
    if(!currentCard) return;
    document.getElementById('likeCount').textContent = currentCard.dataset.likes || 0;
    document.getElementById('dislikeCount').textContent = currentCard.dataset.dislikes || 0;
    document.getElementById('likeBtn').classList.toggle('liked', currentCard.dataset.liked === 'true');
    document.getElementById('dislikeBtn').classList.toggle('disliked', currentCard.dataset.disliked === 'true');
    document.getElementById('saveBtn').style.background = state.bookmarks.some(b => b.id === currentCard.dataset.postId) ? '#f1c40f' : '';
  }

  function swipeTo(index) {
    if(index < 0 || index >= stack.children.length) return;
    state.currentIndex = index;
    updateStack();
    // Добавить XP
    state.xp = Math.min(state.xp + 2, 100);
    document.getElementById('xpBar').style.width = state.xp + '%';
    saveState();

    // Подгрузка новых карточек, если осталось меньше 3
    if(stack.children.length - state.currentIndex < 3) loadMoreCards();
  }

  // Обработчики касаний/мыши
  feedContainer.addEventListener('touchstart', (e) => {
    startY = e.touches[0].clientY;
    swiping = true;
  }, {passive: false});

  feedContainer.addEventListener('touchmove', (e) => {
    if(!swiping) return;
    currentY = e.touches[0].clientY;
    const diff = currentY - startY;
    const card = stack.children[state.currentIndex];
    if(card) {
      card.classList.add('swiping');
      card.style.transform = `translateY(calc(${(0) * 100}% + ${diff}px))`;
    }
  }, {passive: false});

  feedContainer.addEventListener('touchend', () => {
    if(!swiping) return;
    swiping = false;
    const diff = currentY - startY;
    const threshold = 50;
    if(diff < -threshold) swipeTo(state.currentIndex + 1); // свайп вверх
    else if(diff > threshold) swipeTo(state.currentIndex - 1); // свайп вниз
    else updateStack();
  });

  // Поддержка мыши для десктопа
  feedContainer.addEventListener('mousedown', (e) => {
    startY = e.clientY;
    swiping = true;
    e.preventDefault();
  });
  window.addEventListener('mousemove', (e) => {
    if(!swiping) return;
    currentY = e.clientY;
    const diff = currentY - startY;
    const card = stack.children[state.currentIndex];
    if(card) {
      card.classList.add('swiping');
      card.style.transform = `translateY(calc(${0 * 100}% + ${diff}px))`;
    }
  });
  window.addEventListener('mouseup', () => {
    if(!swiping) return;
    swiping = false;
    const diff = currentY - startY;
    const threshold = 50;
    if(diff < -threshold) swipeTo(state.currentIndex + 1);
    else if(diff > threshold) swipeTo(state.currentIndex - 1);
    else updateStack();
  });

  // ========== Загрузка карточек ==========
  async function loadMoreCards() {
    document.getElementById('loader').style.display = 'block';
    try {
      const sub = SUBREDDITS[Math.floor(Math.random() * SUBREDDITS.length)];
      const posts = await fetchPosts(sub, 5);
      const fragment = document.createDocumentFragment();
      posts.forEach(post => {
        const card = createCardElement(post);
        if(card) fragment.appendChild(card);
      });
      stack.appendChild(fragment);
    } catch(e) {}
    document.getElementById('loader').style.display = 'none';
  }

  // ========== Кнопки действий ==========
  document.getElementById('likeBtn').addEventListener('click', () => {
    const card = stack.children[state.currentIndex];
    if(!card) return;
    const postId = card.dataset.postId;
    if(!state.likes[postId]) state.likes[postId] = { likes: 0, dislikes: 0 };
    state.likes[postId].likes++;
    card.dataset.likes = state.likes[postId].likes;
    card.dataset.liked = 'true';
    saveState();
    updateActionBar();
    // анимация сердечка
    const heart = document.createElement('div');
    heart.textContent = '❤️';
    heart.style.cssText = 'position:fixed; top:50%; left:50%; font-size:3rem; pointer-events:none; animation: fly 0.8s ease-out forwards;';
    document.body.appendChild(heart);
    heart.addEventListener('animationend', () => heart.remove());
    const style = document.createElement('style');
    style.textContent = '@keyframes fly{0%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-200%) scale(2)}}';
    document.head.appendChild(style);
  });

  document.getElementById('dislikeBtn').addEventListener('click', () => {
    const card = stack.children[state.currentIndex];
    if(!card) return;
    const postId = card.dataset.postId;
    if(!state.likes[postId]) state.likes[postId] = { likes: 0, dislikes: 0 };
    state.likes[postId].dislikes++;
    card.dataset.dislikes = state.likes[postId].dislikes;
    card.dataset.disliked = 'true';
    saveState();
    updateActionBar();
    swipeTo(state.currentIndex + 1);
  });

  document.getElementById('saveBtn').addEventListener('click', () => {
    const card = stack.children[state.currentIndex];
    if(!card) return;
    const postId = card.dataset.postId;
    const idx = state.bookmarks.findIndex(b => b.id === postId);
    if(idx > -1) state.bookmarks.splice(idx, 1);
    else state.bookmarks.unshift({ id: postId, title: card.querySelector('.card-title')?.textContent, subreddit: card.dataset.subreddit });
    saveState();
    updateActionBar();
  });

  document.getElementById('shareBtn').addEventListener('click', () => {
    const card = stack.children[state.currentIndex];
    if(card && navigator.share) {
      navigator.share({ title: card.querySelector('.card-title')?.textContent, url: `https://reddit.com/r/${card.dataset.subreddit}` });
    }
  });

  // ========== Навигация ==========
  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if(btn.dataset.page === 'feed') { /* уже на ленте */ }
      else if(btn.dataset.page === 'bookmarks') alert('Раздел Избранное в разработке');
      else if(btn.dataset.page === 'explore') alert('Обзор пока не реализован');
      else if(btn.dataset.page === 'profile') alert('Профиль: XP ' + state.xp);
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });

  document.querySelectorAll('.mode-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      state.mode = tab.dataset.mode;
      // Если подписки, фильтруем сабреддиты
    });
  });

  document.getElementById('searchBtn').addEventListener('click', () => {
    const query = prompt('Поиск:');
    if(query) alert('Поиск не реализован');
  });

  // Инициализация
  loadMoreCards().then(() => {
    updateStack();
  });
})();
</script>
</body>
</html>
