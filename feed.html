      --primary: #6c5ce7;
      --primary-soft: #a29bfe;
      --accent: #fd79a8;
      --text: #e8e8f0;
      --text-muted: #8888a0;

    * { margin: 0; padding: 0; box-sizing: border-box; }

      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    /* Легкий фоновый эффект туманности */
    .nebula-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url("data:image/svg+xml,%3Csvg width='100%' height='100%' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3CradialGradient id='a' cx='30%25' cy='20%25' r='50%25'%3E%3Cstop offset='0%25' stop-color='%236c5ce7' stop-opacity='0.12'/%3E%3Cstop offset='100%25' stop-color='transparent'/%3E%3C/radialGradient%3E%3C/defs%3E%3Crect width='100%25' height='100%25' fill='url(%23a)'/%3E%3C/svg%3E") no-repeat;
      pointer-events: none;
      z-index: 0;
    }

    header {
      width: 100%;
      max-width: 720px;
      padding: 0.8rem 1.2rem;
      background: rgba(12, 12, 24, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-weight: 700;
      font-size: 1.5rem;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--primary-soft), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 6px rgba(108,92,231,0.3));
    }
    .header-actions {
      display: flex;
      gap: 0.6rem;
    }
    .header-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text-muted);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      cursor: pointer;
      transition: var(--transition);
      backdrop-filter: blur(8px);
    }
    .header-btn:hover { background: rgba(255,255,255,0.12); color: white; }
    .header-btn.active { background: var(--primary); border-color: var(--primary); color: white; }

    main {
      flex: 1;
      width: 100%;
      max-width: 720px;
      padding: 1rem 1rem 6rem;
      position: relative;
      z-index: 1;
    }

    .feed-container {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    .card {
      background: var(--surface);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform var(--transition), border-color var(--transition);
    }
    .card:hover { transform: translateY(-3px); border-color: rgba(255,255,255,0.15); }

    .media-area {
      position: relative;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      max-height: 70vh;
      overflow: hidden;
    }
    .media-area img,
    .media-area video {
      width: 100%;
      height: auto;
      max-height: 70vh;
      object-fit: contain;
      display: block;
    }
    .media-area iframe {
      width: 100%;
      aspect-ratio: 16/9;
      height: auto;
      border: none;
    }

    .card-body {
      padding: 0.8rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .card-title {
      font-weight: 500;
      font-size: 0.9rem;
      color: var(--text);
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: var(--text-muted);
      font-size: 0.75rem;
    }
    .card-actions {
      display: flex;
      gap: 0.5rem;
      align-items: center;

    .btn-icon {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text-muted);
      padding: 0.3rem 0.8rem;
      border-radius: 20px;
      font-size: 0.8rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      transition: var(--transition);
    }
    .btn-icon:hover { background: rgba(255,255,255,0.1); }
    .btn-icon.liked { background: #2ecc71; border-color: #2ecc71; color: #000; }
    .btn-icon.disliked { background: #e74c3c; border-color: #e74c3c; color: white; }

    .overlay-btn {
      position: absolute;
      top: 10px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      border: none;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1rem;
      cursor: pointer;
      opacity: 0;
      transition: opacity var(--transition);
      z-index: 5;
    }
    .media-area:hover .overlay-btn { opacity: 1; }
    .save-btn { left: 10px; }
    .download-btn { right: 10px; }
    .save-btn.bookmarked { background: #f1c40f; color: #000; }

    /* Нижний бар */
    .bottom-nav {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(16, 18, 38, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 40px;
      display: flex;
      padding: 0.4rem 1.2rem;
      gap: 0.4rem;
      z-index: 30;
      box-shadow: 0 10px 30px rgba(0,0,0,0.7);
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.5rem 1.2rem;
      border-radius: 30px;
      font-weight: 500;
      font-size: 0.85rem;
      color: var(--text-muted);
      background: transparent;
      border: none;
      cursor: pointer;
      transition: var(--transition);
      white-space: nowrap;
    }
    .nav-item.active { background: var(--primary); color: white; box-shadow: 0 0 14px rgba(108,92,231,0.4); }
    .nav-item:hover:not(.active) { color: white; background: rgba(255,255,255,0.05); }

    /* Модалки */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(16px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--transition);
    }
    .modal.open { opacity: 1; pointer-events: auto; }
    .modal-content {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 1.8rem;
      max-width: 600px;
      width: 92%;
      max-height: 80vh;
      overflow-y: auto;
      border: 1px solid var(--border);
      box-shadow: 0 20px 50px rgba(0,0,0,0.8);
      position: relative;
    }
    .modal-close {
      position: absolute;
      top: 0.8rem;
      right: 1rem;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1.6rem;
      cursor: pointer;
    }
    .modal-close:hover { color: white; }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 0.8rem;
      margin-top: 1rem;
    }
    .tile {
      background: rgba(255,255,255,0.04);
      border-radius: 16px;
      padding: 1.2rem 0.8rem;
      text-align: center;
      cursor: pointer;
      transition: var(--transition);
      font-weight: 500;
      border: 1px solid transparent;
    }
    .tile:hover { background: rgba(108,92,231,0.15); border-color: var(--primary); }

    .loading-placeholder {
      height: 300px;
      background: linear-gradient(90deg, #1a1c33 25%, #23254a 50%, #1a1c33 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: var(--radius);
    }
    @keyframes shimmer { 0%{background-position:200% 0}100%{background-position:-200% 0} }

    .to-top {
      position: fixed;
      bottom: 100px;
      right: 20px;
      width: 44px;
      height: 44px;
      background: var(--primary);
      border-radius: 50%;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity var(--transition);
      z-index: 25;
      cursor: pointer;
    }
    .to-top.visible { opacity: 1; }
  </style>
</head>

      return new Promise((resolve, reject) => {
        const bases = ['https://www.reddit.com', 'https://old.reddit.com'];
        let attempt = 0;
        const tryLoad = () => {
          if(attempt >= bases.length) return reject(new Error('JSONP failed'));
          const base = bases[attempt];
          const script = document.createElement('script');
          const full = base + url + (url.includes('?')?'&':'?') + 'jsonp=' + cb + '&_=' + Date.now();
          const timer = setTimeout(() => { cleanup(); attempt++; tryLoad(); }, timeout);
          function cleanup() { clearTimeout(timer); delete window[cb]; if(script.parentNode) script.parentNode.removeChild(script); }
          window[cb] = (data) => { cleanup(); resolve(data); };
          script.onerror = () => { cleanup(); attempt++; tryLoad(); };
          script.src = full;
          document.head.appendChild(script);
        };
        tryLoad();

      body.querySelector('.like-btn').onclick = (e) => {
        e.stopPropagation();
        if(feedbackDone) return;
        feedbackDone = true;
        recordLike(data.id, true);
        updateCounters();
      };
      body.querySelector('.dislike-btn').onclick = (e) => {
        e.stopPropagation();
        if(feedbackDone) return;
        feedbackDone = true;
        recordLike(data.id, false);
        updateCounters();
      };
      function updateCounters() {
        const l = state.likes[data.id]?.likes || 0;
        const d = state.likes[data.id]?.dislikes || 0;
        body.querySelector('.like-btn').textContent = `👍 ${l}`;
        body.querySelector('.dislike-btn').textContent = `👎 ${d}`;
      }

      return card;
    }

    function toggleBookmark(data) {
      const idx = state.bookmarks.findIndex(b => b.id === data.id);
      if(idx > -1) state.bookmarks.splice(idx, 1);
      else state.bookmarks.unshift({
        id: data.id, title: data.title, thumbnail: data.thumbnail,
        url: data.url, isVideo: data.is_video || data.domain === 'redgifs.com',
        media: data.is_video ? data.media?.reddit_video?.fallback_url : null
      });
      saveState();
    }

    function recordLike(postId, liked) {
      if(!state.likes[postId]) state.likes[postId] = { likes: 0, dislikes: 0 };
      liked ? state.likes[postId].likes++ : state.likes[postId].dislikes++;
      saveState();
    }

    // ===== Загрузка ленты =====
    let isLoading = false;
    async function loadFeed(clear = false) {
      if(isLoading) return;
      isLoading = true;
      const loader = document.getElementById('loader');
      loader.style.display = 'block';
      const feedEl = document.getElementById('feed');
      if(clear) feedEl.innerHTML = '';

      try {
        let posts;
        if(state.feedMode === 'search' && state.searchQuery) {
          posts = await searchReddit(state.searchQuery, 15, state.searchAfter);
          state.searchAfter = posts.length ? posts[posts.length-1].data.name : null;
        } else if(state.feedMode === 'subreddit' && state.currentSub) {
          posts = await fetchSubreddit(state.currentSub, 15);
        } else {
          const randomSub = SUBREDDITS[Math.floor(Math.random() * SUBREDDITS.length)];
          posts = await fetchSubreddit(randomSub, 15);
        }

        const fragment = document.createDocumentFragment();
        posts.forEach(p => {
          const card = createCard(p);
          if(card) fragment.appendChild(card);
        });
        feedEl.appendChild(fragment);
      } catch(e) {
        feedEl.innerHTML += '<div style="color:red; padding:1rem;">Ошибка загрузки</div>';
      }
      loader.style.display = 'none';
      isLoading = false;
    }

    // Бесконечный скролл
    const sentinel = document.createElement('div');
    sentinel.id = 'sentinel';
    document.querySelector('main').appendChild(sentinel);
    new IntersectionObserver(entries => {
      if(entries[0].isIntersecting && state.activeTab === 'feed') loadFeed();
    }, { rootMargin: '600px' }).observe(sentinel);

    // ===== UI навигация =====
    document.querySelector('.bottom-nav').addEventListener('click', e => {
      const btn = e.target.closest('.nav-item');
      if(!btn) return;
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.activeTab = btn.dataset.tab;
      handleTabSwitch();
    });

    function handleTabSwitch() {
      const feed = document.getElementById('feed');
      feed.innerHTML = '';
      if(state.activeTab === 'feed') {
        state.feedMode = 'mixed';
        loadFeed(true);
      } else if(state.activeTab === 'stars') {
        showStarsCatalog();
      } else if(state.activeTab === 'genres') {
        showGenresCatalog();
      } else if(state.activeTab === 'more') {
        showMoreCatalog();
      }
    }

    function showStarsCatalog() {
      const content = document.getElementById('catalogContent');
      content.innerHTML = '<h3>⭐ Популярные звёзды</h3><div class="grid-3"></div>';
      const grid = content.querySelector('.grid-3');
      STARS.forEach(star => {
        const tile = document.createElement('div');
        tile.className = 'tile';
        tile.textContent = star.name;
        tile.onclick = () => { closeCatalog(); startSearch(star.query); };
        grid.appendChild(tile);
      });
      document.getElementById('catalogModal').classList.add('open');
    }

    function showGenresCatalog() {
      const content = document.getElementById('catalogContent');
      content.innerHTML = '<h3>🎭 Жанры</h3><div class="grid-3"></div>';
      const grid = content.querySelector('.grid-3');
      GENRES.forEach(genre => {
        const tile = document.createElement('div');
        tile.className = 'tile';
        tile.textContent = `${genre.emoji} ${genre.name}`;
        tile.onclick = () => { closeCatalog(); startSearch(genre.query); };
        grid.appendChild(tile);
      });
      document.getElementById('catalogModal').classList.add('open');
    }

    function showMoreCatalog() {
      const content = document.getElementById('catalogContent');
      content.innerHTML = '<h3>📂 Дополнительно</h3><div class="grid-3"></div>';
      const grid = content.querySelector('.grid-3');
      MORE_TABS.forEach(item => {
        const tile = document.createElement('div');
        tile.className = 'tile';
        tile.textContent = item.label;
        tile.onclick = () => { closeCatalog(); startSubreddit(item.sub); };
        grid.appendChild(tile);
      });
      document.getElementById('catalogModal').classList.add('open');
    }

    function startSearch(query) {
      state.activeTab = 'feed';
      state.feedMode = 'search';
      state.searchQuery = query;
      state.searchAfter = null;
      document.getElementById('feed').innerHTML = '';
      loadFeed(true);
      document.querySelector('.nav-item[data-tab="feed"]').classList.add('active');
    }

    function startSubreddit(sub) {
      state.activeTab = 'feed';
      state.feedMode = 'subreddit';
      state.currentSub = sub;
      document.getElementById('feed').innerHTML = '';
      loadFeed(true);
      document.querySelector('.nav-item[data-tab="feed"]').classList.add('active');
    }

    function closeCatalog() {
      document.getElementById('catalogModal').classList.remove('open');
    }

    // ===== Модалки =====
    document.getElementById('openBookmarksBtn').onclick = () => {
      const grid = document.getElementById('bookmarksGrid');
      grid.innerHTML = '';
      document.getElementById('bookmarksEmpty').style.display = state.bookmarks.length ? 'none' : 'block';
      state.bookmarks.forEach(bm => {
        const tile = document.createElement('div');
        tile.className = 'tile';
        tile.innerHTML = `<img src="${bm.thumbnail}" onerror="this.style.display='none'" style="width:100%; border-radius:8px;"><p style="font-size:0.75rem; margin-top:0.3rem;">${bm.title?.slice(0,25)}</p>`;
        grid.appendChild(tile);
      });
      document.getElementById('bookmarksModal').classList.add('open');
    };
    document.getElementById('closeBookmarksModal').onclick = () => document.getElementById('bookmarksModal').classList.remove('open');

    document.getElementById('openSearchBtn').onclick = () => {
      const panel = document.getElementById('searchPanel');
      panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
      if(panel.style.display === 'block') document.getElementById('searchInput').focus();
    };
    document.getElementById('searchBtn').onclick = () => {
      const q = document.getElementById('searchInput').value.trim();
      if(q) { startSearch(q); document.getElementById('searchPanel').style.display = 'none'; }
    };
    document.getElementById('searchInput').addEventListener('keypress', e => {
      if(e.key === 'Enter') { startSearch(e.target.value); document.getElementById('searchPanel').style.display = 'none'; }
    });

    // Инструмент скачивания (упрощён)
    document.getElementById('openDownloadToolBtn').onclick = () => document.getElementById('downloadToolModal').classList.add('open');
    document.getElementById('closeDownloadToolModal').onclick = () => document.getElementById('downloadToolModal').classList.remove('open');
    document.getElementById('watchBtn').onclick = () => {
      const url = document.getElementById('downloadLinkInput').value.trim();
      if(url) window.open(url, '_blank');
      else document.getElementById('dlMsg').textContent = 'Вставьте ссылку';
    };

    // Кнопка наверх
    window.addEventListener('scroll', () => {
      document.getElementById('toTopBtn').classList.toggle('visible', scrollY > 700);
    });
    document.getElementById('toTopBtn').onclick = () => window.scrollTo({top:0, behavior:'smooth'});

    // Старт
    loadFeed(true);
  })();
  </script>
</body>
</html>
