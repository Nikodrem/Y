        if (saved.recentSubs) state.recentSubs = saved.recentSubs;
        if (saved.mode) state.mode = saved.mode;
        state.bookmarks = saved.bookmarks || [];
      }
    } catch (e) {}

    function saveState() {
      const toSave = {
        subWeights: state.subWeights,
        tagWeights: state.tagWeights,
        seenPosts: Array.from(state.seenPosts).slice(-SEEN_MAX),
        seenUrls: Array.from(state.seenUrls).slice(-SEEN_MAX),
        recentSubs: state.recentSubs.slice(-RECENT_SUB_LIMIT * 2),
        mode: state.mode,
        bookmarks: state.bookmarks
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave));
    }

    function markSeen(postId, url) {
      state.seenPosts.add(postId);
      if (url) state.seenUrls.add(url);
      if (state.seenPosts.size > SEEN_MAX) {
        const iter = state.seenPosts.values();
        for (let i = 0; i < state.seenPosts.size - SEEN_MAX; i++) state.seenPosts.delete(iter.next().value);
      }
      if (state.seenUrls.size > SEEN_MAX) {
        const iter = state.seenUrls.values();
        for (let i = 0; i < state.seenUrls.size - SEEN_MAX; i++) state.seenUrls.delete(iter.next().value);
      }
    }

    function recordFeedback(postId, subreddit, tags, liked) {
      if (!state.subWeights[subreddit]) state.subWeights[subreddit] = { likes: 0, dislikes: 0 };
      liked ? state.subWeights[subreddit].likes++ : state.subWeights[subreddit].dislikes++;
      tags.forEach(tag => {
        if (!state.tagWeights[tag]) state.tagWeights[tag] = { likes: 0, dislikes: 0 };
        liked ? state.tagWeights[tag].likes++ : state.tagWeights[tag].dislikes++;
      });
      saveState();
    }

    function selectNextSub() {
      const candidates = CHANNELS[currentChannel] || CHANNELS.mix;
      let available = candidates.filter(sub => !state.recentSubs.includes(sub));
      if (available.length === 0) {
        state.recentSubs = [];
        available = [...candidates];
      }
      const pick = available[Math.floor(Math.random() * available.length)];
      state.recentSubs.push(pick);
      if (state.recentSubs.length > RECENT_SUB_LIMIT) {
        state.recentSubs.shift();
      }
      saveState();
      return pick;
    }

    function jsonp(path, callbackName, timeoutMs = 15000) {
      return new Promise((resolve, reject) => {
        const bases = ['https://www.reddit.com', 'https://old.reddit.com'];
        let attempt = 0;

        function tryLoad() {
          if (attempt >= bases.length) {
            reject(new Error('JSONP network error'));
            return;
          }
          const base = bases[attempt];
          const script = document.createElement('script');
          script.referrerPolicy = 'no-referrer';
          const separator = path.includes('?') ? '&' : '?';
          const fullUrl = base + path + separator + 'jsonp=' + callbackName + '&_=' + Date.now();

          const timeout = setTimeout(() => {
            cleanup();
            attempt++;
            tryLoad();
          }, timeoutMs);

          function cleanup() {
            clearTimeout(timeout);
            delete window[callbackName];
            if (script.parentNode) script.parentNode.removeChild(script);
          }

          window[callbackName] = (data) => {
            cleanup();
            resolve(data);
          };

          script.onerror = () => {
            cleanup();
            attempt++;
            tryLoad();
          };

          script.src = fullUrl;
          document.head.appendChild(script);
        }

        tryLoad();
      });
    }

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function extractTags(title, subreddit) {
      const tags = [];
      const lower = title.toLowerCase();
      const patterns = {
        'milf': /милфа|milf|мамочка|зрелая/i,
        'alt': /альт|alt|goth|тату|пирсинг|нефор|прокол/i,
        'blonde': /блондин|blonde|светлые/i,
        'brunette': /брюнет|brunette|тёмные/i,
        'redhead': /рыж|redhead|рыжая/i,
        'asian': /азиат|asian|япон|кита/i,
        'artistic': /art|худож|эстети|чб|bnw/i,
        'lingerie': /бель[ёе]|кружев|lingerie/i,
        'curvy': /curvy|пыш|толст|фигур|plus.?size/i,
        'porno': /porn|sex|hardcore|blowjob|anal/i
      };
      for (let [tag, regex] of Object.entries(patterns)) {
        if (regex.test(lower)) tags.push(tag);
      }
      tags.push(subreddit.toLowerCase());
      return [...new Set(tags)];
    }

    function downloadImage(imgElement, filename) {
      const canvas = document.createElement('canvas');
      canvas.width = imgElement.naturalWidth;
      canvas.height = imgElement.naturalHeight;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(imgElement, 0, 0);
      canvas.toBlob((blob) => {
        const blobUrl = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = blobUrl;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(blobUrl);
      }, 'image/jpeg', 0.95);
    }

    function downloadVideo(url) {
      window.open(url, '_blank');
    }

    // Универсальный скачивальщик RedGIFs (без fallback-плеера)
    async function downloadRedGif(videoId) {
      const proxyList = [
        (url) => `https://corsproxy.io/?url=${encodeURIComponent(url)}`,
        (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`
      ];

      let videoUrl = null;

      // Получаем данные через API RedGIFs
      for (const proxy of proxyList) {
        try {
          const apiUrl = `https://api.redgifs.com/v2/gifs/${videoId}`;
          const response = await fetch(proxy(apiUrl));
          const data = await response.json();
          videoUrl = data.urls?.hd || data.urls?.sd;
          if (videoUrl) break;
        } catch (e) {}
      }

      if (!videoUrl) {
        alert('Не удалось получить ссылку на видео. Возможно, прокси недоступны.');
        return;
      }

      // Скачиваем сам видеофайл через прокси
      let blob = null;
      for (const proxy of proxyList) {
        try {
          const response = await fetch(proxy(videoUrl));
          blob = await response.blob();
          if (blob.size > 0) break;
        } catch (e) {}
      }

      if (!blob || blob.size === 0) {
        // В крайнем случае открываем прямую ссылку (может сработать на некоторых устройствах)
        const a = document.createElement('a');
        a.href = videoUrl;
        a.download = `${videoId}.mp4`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        return;
      }

      const blobUrl = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = blobUrl;
      a.download = `${videoId}.mp4`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(blobUrl);
    }

    // Скачать видео по ссылке (Reddit, RedGIFs, Imgur)
    async function downloadByLink(link) {
      const msgEl = document.getElementById('downloadToolMessage');
      msgEl.textContent = 'Обработка ссылки...';
      try {
        let videoUrl = null;
        let filename = 'video.mp4';
        if (link.includes('v.redd.it') || link.includes('reddit.com/r/')) {
          const match = link.match(/comments\/([a-z0-9]+)/i);
          if (match) {
            const postId = match[1];
            const apiUrl = `https://www.reddit.com/comments/${postId}.json`;
            const response = await fetch(`https://corsproxy.io/?url=${encodeURIComponent(apiUrl)}`);
            const json = await response.json();
            const post = json[0]?.data?.children[0]?.data;
            if (post?.media?.reddit_video?.fallback_url) {
              videoUrl = post.media.reddit_video.fallback_url;
              filename = post.title ? post.title.replace(/[^a-z0-9]/gi, '_').substring(0, 30) + '.mp4' : filename;
            }
          }
        }
        else if (link.includes('redgifs.com/watch/')) {
          const match = link.match(/watch\/([a-zA-Z0-9]+)/);
          if (match) {
            const videoId = match[1];
            // Используем ту же функцию скачивания RedGIFs
            await downloadRedGif(videoId);
            msgEl.textContent = 'Скачивание началось!';
            return;
          }
        }
        else if (link.includes('i.imgur.com') && link.endsWith('.gifv')) {
          videoUrl = link.replace(/\.gifv$/, '.mp4');
          filename = 'imgur_video.mp4';
        }
        else if (link.match(/\.(mp4|webm|mov)(\?.*)?$/i)) {
          videoUrl = link;
          filename = 'direct_video.mp4';
        }

        if (!videoUrl) {
          msgEl.textContent = 'Не удалось извлечь видео из ссылки.';
          return;
        }

        const blob = await fetch(videoUrl).then(r => r.blob());
        const blobUrl = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = blobUrl;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(blobUrl);
        msgEl.textContent = 'Скачивание началось!';
      } catch (err) {
        console.error(err);
        msgEl.textContent = 'Ошибка: ' + err.message;
      }
    }

    function isVideoPost(data) {
      if (data.is_video) return true;
      if (data.domain === 'i.imgur.com' && data.url && data.url.endsWith('.gifv')) return true;
      if (data.domain === 'redgifs.com' || data.domain === 'www.redgifs.com') return true;
      if (data.url && data.url.match(/\.(mp4|webm|mov)(\?.*)?$/i)) return true;
      return false;
    }

    function getVideoInfo(data) {
      if (data.is_video && data.media?.reddit_video?.fallback_url) {
        return { type: 'reddit', videoUrl: data.media.reddit_video.fallback_url, thumbnail: data.thumbnail };
      }
      if (data.domain === 'i.imgur.com' && data.url?.endsWith('.gifv')) {
        return { type: 'imgur', videoUrl: data.url.replace(/\.gifv$/, '.mp4'), thumbnail: data.thumbnail || data.url.replace(/\.gifv$/, '.jpg') };
      }
      if (data.domain === 'redgifs.com' || data.domain === 'www.redgifs.com') {
        const match = data.url.match(/\/watch\/([a-zA-Z0-9]+)/);
        if (match) {
          return { type: 'redgifs', videoId: match[1], videoUrl: `https://www.redgifs.com/ifr/${match[1]}`, thumbnail: `https://thumbs2.redgifs.com/${match[1]}-mobile.jpg` };
        }
      }
      if (data.url?.match(/\.(mp4|webm|mov)(\?.*)?$/i)) {
        return { type: 'direct', videoUrl: data.url, thumbnail: data.thumbnail };
      }
      return null;
    }

    function toggleBookmark(bookmarkData) {
      const index = state.bookmarks.findIndex(b => b.id === bookmarkData.id);
      if (index > -1) {
        state.bookmarks.splice(index, 1);
        saveState();
        return false;
      } else {
        state.bookmarks.unshift(bookmarkData);
        saveState();
        return true;
      }
    }

    function isBookmarked(postId) {
      return state.bookmarks.some(b => b.id === postId);
    }

    function createBookmarkData(data) {
      const videoInfo = getVideoInfo(data);
      return {
        id: data.id,
        title: data.title || '',
        subreddit: data.subreddit,
        permalink: data.permalink,
        ...videoInfo
      };
    }

    function createCard(post) {
      const data = post.data || post;
      if (!data || data.stickied) return null;
      const title = data.title || '';
      const url = data.url;
      const domain = data.domain;
      const subreddit = data.subreddit;
      const postId = data.id;

      if (state.seenPosts.has(postId) || (url && state.seenUrls.has(url))) return null;
      if (isBlockedContent(title, subreddit)) return null;

      const tags = extractTags(title, subreddit);
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.postId = postId;
      card.dataset.subreddit = subreddit;
      card.dataset.tags = tags.join(',');

      let mediaElement = null;
      let downloadUrl = null;
      let isImage = false;
      let redgifsVideoId = null;

      if (data.is_video && data.media && data.media.reddit_video) {
        const fallback = data.media.reddit_video.fallback_url;
        const thumbnail = (data.thumbnail && data.thumbnail !== 'self' && data.thumbnail !== 'default') ? data.thumbnail : '';
        downloadUrl = fallback;
        isImage = false;

        mediaElement = document.createElement('video');
        mediaElement.src = fallback;
        mediaElement.controls = true;
        mediaElement.playsInline = true;
        mediaElement.preload = 'metadata';
        if (thumbnail) mediaElement.poster = thumbnail;

        mediaElement.addEventListener('error', () => {
          const permalink = 'https://www.reddit.com' + (data.permalink || '');
          const wrapper = document.createElement('div');
          wrapper.className = 'video-preview';
          if (thumbnail) {
            const img = document.createElement('img');
            img.src = thumbnail; img.alt = title || 'Видео'; img.loading = 'lazy';
            wrapper.appendChild(img);
          } else {
            wrapper.style.background = '#111'; wrapper.style.height = '200px';
            wrapper.style.display = 'flex'; wrapper.style.alignItems = 'center';
            wrapper.style.justifyContent = 'center'; wrapper.style.color = '#888';
            wrapper.textContent = '🎬 Видео';
          }
          wrapper.addEventListener('click', () => window.open(permalink, '_blank'));
          if (mediaElement.parentNode) {
            mediaElement.parentNode.replaceChild(wrapper, mediaElement);
            mediaElement = wrapper;
            const existingBtn = card.querySelector('.download-btn');
            if (existingBtn) existingBtn.remove();
            downloadUrl = null;
          }
        });
      }
      else if (url && domain === 'i.imgur.com' && url.endsWith('.gifv')) {
        const mp4Url = url.replace(/\.gifv$/, '.mp4');
        downloadUrl = mp4Url; isImage = false;
        mediaElement = document.createElement('video');
        mediaElement.src = mp4Url; mediaElement.controls = true;
        mediaElement.playsInline = true; mediaElement.preload = 'metadata';
      }
      else if (domain === 'redgifs.com' || domain === 'www.redgifs.com') {
        const match = url.match(/\/watch\/([a-zA-Z0-9]+)/);
        if (match) {
          redgifsVideoId = match[1];
          const wrapper = document.createElement('div');
          wrapper.className = 'redgifs-preview';
          const preview = document.createElement('img');
          preview.src = `https://thumbs2.redgifs.com/${redgifsVideoId}-mobile.jpg`;
          preview.alt = title || 'RedGIFs'; preview.loading = 'lazy';
          wrapper.appendChild(preview);
          wrapper.addEventListener('click', () => {
            const iframe = document.createElement('iframe');
            iframe.src = `https://www.redgifs.com/ifr/${redgifsVideoId}`;
            iframe.allowFullscreen = true; iframe.allow = 'autoplay; fullscreen';
            iframe.referrerPolicy = 'no-referrer'; iframe.loading = 'lazy';
            wrapper.innerHTML = ''; wrapper.appendChild(iframe);
            wrapper.classList.remove('redgifs-preview');
          });
          mediaElement = wrapper;
        }
      }
      else if (url && (url.match(/\.(jpg|jpeg|png|gif|webp)(\?.*)?$/i) || domain === 'i.redd.it' || domain === 'i.imgur.com')) {
        downloadUrl = url; isImage = true;
        mediaElement = document.createElement('img');
        mediaElement.src = url; mediaElement.alt = title || 'Контент'; mediaElement.loading = 'lazy';
      }

      if (!mediaElement) return null;

      card.appendChild(mediaElement);

      if (isVideoPost(data)) {
        const bookmarkBtn = document.createElement('button');
        bookmarkBtn.className = 'bookmark-btn';
        bookmarkBtn.style.display = 'block';
        bookmarkBtn.textContent = '🔖';
        if (isBookmarked(postId)) bookmarkBtn.classList.add('bookmarked');
        bookmarkBtn.addEventListener('click', (e) => {
          e.stopPropagation(); e.preventDefault();
          const added = toggleBookmark(createBookmarkData(data));
          if (added) {
            bookmarkBtn.classList.add('bookmarked');
          } else {
            bookmarkBtn.classList.remove('bookmarked');
          }
        });
        card.appendChild(bookmarkBtn);
      }

      // Кнопка скачать (RedGIFs обрабатывается отдельно)
      if (redgifsVideoId || downloadUrl) {
        const downloadBtn = document.createElement('button');
        downloadBtn.className = 'download-btn';
        downloadBtn.textContent = '⬇ Скачать';
        downloadBtn.addEventListener('click', (e) => {
          e.stopPropagation(); e.preventDefault();
          if (isImage) {
            const img = mediaElement.tagName === 'IMG' ? mediaElement : mediaElement.querySelector('img');
            if (img && img.complete && img.naturalWidth > 0) {
              const ext = downloadUrl.split('.').pop().split('?')[0] || 'jpg';
              const filename = (title || 'image').replace(/[^a-z0-9]/gi, '_').substring(0, 30) + '.' + ext;
              downloadImage(img, filename);
            } else {
              const tempImg = new Image();
              tempImg.crossOrigin = 'anonymous';
              tempImg.src = downloadUrl;
              tempImg.onload = () => {
                const ext = downloadUrl.split('.').pop().split('?')[0] || 'jpg';
                const filename = (title || 'image').replace(/[^a-z0-9]/gi, '_').substring(0, 30) + '.' + ext;
                downloadImage(tempImg, filename);
              };
              tempImg.onerror = () => window.open(downloadUrl, '_blank');
            }
          } else if (redgifsVideoId) {
            downloadRedGif(redgifsVideoId);
          } else {
            downloadVideo(downloadUrl);
          }
        });
        card.appendChild(downloadBtn);
      }

      if (title) {
        const cap = document.createElement('div');
        cap.className = 'caption'; cap.textContent = title;
        card.appendChild(cap);
      }

      const actions = document.createElement('div');
      actions.className = 'actions';
      const likeBtn = document.createElement('button');
      likeBtn.innerHTML = '👍 <span>0</span>';
      const dislikeBtn = document.createElement('button');
      dislikeBtn.innerHTML = '👎 <span>0</span>';

      let feedbackRecorded = false;
      likeBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (feedbackRecorded) return;
        feedbackRecorded = true;
        likeBtn.classList.add('liked');
        recordFeedback(postId, subreddit, tags, true);
        updateCounts();
      });
      dislikeBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (feedbackRecorded) return;
        feedbackRecorded = true;
        dislikeBtn.classList.add('disliked');
        recordFeedback(postId, subreddit, tags, false);
        updateCounts();
      });

      function updateCounts() {
        const subW = state.subWeights[subreddit] || {};
        likeBtn.querySelector('span').textContent = subW.likes || 0;
        dislikeBtn.querySelector('span').textContent = subW.dislikes || 0;
      }
      updateCounts();

      actions.appendChild(likeBtn);
      actions.appendChild(dislikeBtn);
      card.appendChild(actions);

      markSeen(postId, url);
      saveState();
      return card;
    }

    // Рендер кабинета (закладки)

            toggleBookmark(bm);
            renderBookmarksCabinet();
          });

            const downloadSmallBtn = document.createElement('button');
            downloadSmallBtn.textContent = '⬇';

            downloadSmallBtn.addEventListener('click', (e) => {
              e.stopPropagation();
              downloadRedGif(bm.videoId);

    }

    function appendCards(posts, clear = false) {
      const feed = document.getElementById('feed');
      if (clear) feed.innerHTML = '';
      const shuffled = shuffle([...posts]);

      const fragment = document.createDocumentFragment();
      shuffled.forEach(post => {
        const card = createCard(post);
        if (card) fragment.appendChild(card);
      });
      feed.appendChild(fragment);

      const cards = feed.querySelectorAll('.card');
      if (cards.length > MAX_DOM_CARDS) {
        for (let i = 0; i < cards.length - MAX_DOM_CARDS; i++) {
          cards[i].remove();
        }
      }
    }

    // Генератор SVG-заглушки
    function createStarPlaceholder(name, country) {
      const initials = name.split(' ').map(w => w.charAt(0)).join('').slice(0, 2);
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" width="100%" height="100%">
        <rect fill="#1a1a2e" width="100" height="120" rx="8"/>
        <text fill="#f0a0c0" font-size="20" font-weight="bold" text-anchor="middle" x="50" y="55">${initials}</text>
        <text fill="#aaa" font-size="10" text-anchor="middle" x="50" y="80">${country}</text>
      </svg>`;
      return 'data:image/svg+xml,' + encodeURIComponent(svg);
    }

    // Универсальная загрузка видео с пагинацией и фильтрацией
    async function loadVideoBlock({ query, subreddit, container, after = null, filterVideo = false, loadMoreCallback }) {
      try {
        let path;
        if (subreddit) {
          path = `/r/${subreddit}/hot.json?limit=25`;
          if (after) path += `&after=${after}`;
        } else if (query) {
          const encoded = encodeURIComponent(query + ' nsfw:yes');
          path = `/search.json?q=${encoded}&limit=25&include_over_18=on&sort=new`;
          if (after) path += `&after=${after}`;
        } else {
          throw new Error('No query or subreddit');
        }
        const json = await jsonp(path, 'videoBlockCallback');
        let children = json.data.children;
        const newAfter = json.data.after;

        if (filterVideo) {
          children = children.filter(p => isVideoPost(p.data));
        }

        const shuffled = shuffle([...children]);
        const fragment = document.createDocumentFragment();
        shuffled.forEach(post => {
          const card = createCard(post);
          if (card) fragment.appendChild(card);
        });
        container.appendChild(fragment);

        if (newAfter && loadMoreCallback) {
          const btn = document.createElement('button');
          btn.textContent = 'Загрузить ещё';
          btn.className = 'category-btn';
          btn.style.margin = '1rem auto';
          btn.style.display = 'block';
          const loadMore = () => {
            btn.remove();
            loadMoreCallback(newAfter);
          };
          btn.addEventListener('click', loadMore);
          container.appendChild(btn);
        }
      } catch (err) {
        container.innerHTML = `<div class="error">Ошибка: ${err.message}</div>`;
      }
    }

    // Порно-микс
    function loadPornoMix(container) {
      const randomSub = CHANNELS.mix[Math.floor(Math.random() * CHANNELS.mix.length)];
      document.getElementById('starsModalTitle').textContent = '🍿 Порно микс';
      container.innerHTML = '';
      loadVideoBlock({
        subreddit: randomSub,
        container: container,
        filterVideo: false,
        loadMoreCallback: (after) => loadVideoBlock({
          subreddit: randomSub,
          container: container,
          after: after,
          filterVideo: false,
          loadMoreCallback: (after2) => loadVideoBlock({
            subreddit: randomSub,
            container: container,
            after: after2,
            filterVideo: false,
            loadMoreCallback: null
          })
        })
      });
    }

    // Жанры и девушки – с фильтрацией видео
    function loadGenre(genre, container, after = null) {
      document.getElementById('starsModalTitle').textContent = genre.label;
      if (!after) container.innerHTML = '';
      loadVideoBlock({
        query: genre.query,
        container: container,
        after: after,
        filterVideo: true,
        loadMoreCallback: (newAfter) => loadGenre(genre, container, newAfter)
      });
    }

    function showGenres(container) {
      document.getElementById('starsModalTitle').textContent = '🎭 Жанры';
      container.innerHTML = '';
      const backBtn = document.createElement('button');
      backBtn.className = 'category-btn';
      backBtn.textContent = '← Назад';
      backBtn.style.marginBottom = '1rem';
      backBtn.addEventListener('click', () => showMainPornoMenu(container));
      container.appendChild(backBtn);

      const grid = document.createElement('div');
      grid.className = 'category-buttons';
      SEX_GENRES.forEach(genre => {
        const btn = document.createElement('button');
        btn.className = 'category-btn';
        btn.textContent = genre.label;
        btn.addEventListener('click', () => loadGenre(genre, container));
        grid.appendChild(btn);
      });
      container.appendChild(grid);
    }

    function showGirlType(type, container) {
      document.getElementById('starsModalTitle').textContent = type.label;
      container.innerHTML = '';
      const backBtn = document.createElement('button');
      backBtn.className = 'category-btn';
      backBtn.textContent = '← Назад';
      backBtn.style.marginBottom = '1rem';
      backBtn.addEventListener('click', () => showMainPornoMenu(container));
      container.appendChild(backBtn);
      loadGenre(type, container);
    }

    function showStarsByCategory(categoryKey, container) {
      const stars = STARS_DATA[categoryKey];
      if (!stars) return;
      document.getElementById('starsModalTitle').textContent = categoryKey === 'pornstars' ? 'Порнозвёзды' : 'Домашнее';
      container.innerHTML = '';
      const backBtn = document.createElement('button');
      backBtn.className = 'category-btn';
      backBtn.textContent = '← Назад';
      backBtn.style.marginBottom = '1rem';
      backBtn.addEventListener('click', () => showMainPornoMenu(container));
      container.appendChild(backBtn);
      const grid = document.createElement('div');
      grid.className = 'stars-grid';
      stars.forEach(star => {
        const card = document.createElement('div');
        card.className = 'star-card';
        const imgDiv = document.createElement('div');
        imgDiv.className = 'star-img';
        imgDiv.style.backgroundImage = `url('${createStarPlaceholder(star.name, star.country)}')`;
        imgDiv.style.backgroundSize = 'cover';
        imgDiv.style.backgroundPosition = 'center';
        card.appendChild(imgDiv);
        const info = document.createElement('div');
        info.className = 'star-info';
        info.innerHTML = `<div class="star-name">${star.name}</div><div class="star-country">${star.country}</div>`;
        card.appendChild(info);
        card.addEventListener('click', () => {
          document.getElementById('starsModalTitle').textContent = star.name;
          container.innerHTML = '';
          const backBtn2 = document.createElement('button');
          backBtn2.className = 'category-btn';
          backBtn2.textContent = '← Назад к списку';
          backBtn2.style.marginBottom = '1rem';
          backBtn2.addEventListener('click', () => showStarsByCategory(categoryKey, container));
          container.appendChild(backBtn2);
          const videoContainer = document.createElement('div');
          container.appendChild(videoContainer);
          loadVideoBlock({
            query: star.name,
            container: videoContainer,
            filterVideo: true,
            loadMoreCallback: (after) => loadVideoBlock({
              query: star.name,
              container: videoContainer,
              after: after,
              filterVideo: true,
              loadMoreCallback: null
            })
          });
        });
        grid.appendChild(card);
      });
      container.appendChild(grid);
    }

    function showMainPornoMenu(container) {
      document.getElementById('starsModalTitle').textContent = '🎬 Порно';
      container.innerHTML = '';

      const girlsSection = document.createElement('div');
      girlsSection.className = 'category-section';
      girlsSection.innerHTML = '<h3>👩‍🦰 Девушки</h3>';
      const girlsGrid = document.createElement('div');
      girlsGrid.className = 'category-buttons';
      [
        { label: '⭐ Порнозвёзды', action: () => showStarsByCategory('pornstars', container) },
        { label: '🏠 Домашнее', action: () => showStarsByCategory('home', container) }
      ].concat(GIRL_TYPES.map(type => ({ label: type.label, action: () => showGirlType(type, container) })))
      .forEach(item => {
        const btn = document.createElement('button');
        btn.className = 'category-btn';
        btn.textContent = item.label;
        btn.addEventListener('click', item.action);
        girlsGrid.appendChild(btn);
      });
      girlsSection.appendChild(girlsGrid);
      container.appendChild(girlsSection);

      const genreSection = document.createElement('div');
      genreSection.className = 'category-section';
      genreSection.innerHTML = '<h3>🎭 Жанры</h3>';
      const genreGrid = document.createElement('div');
      genreGrid.className = 'category-buttons';
      const mixBtn = document.createElement('button');
      mixBtn.className = 'category-btn';
      mixBtn.textContent = '🎲 Быстрый микс';
      mixBtn.addEventListener('click', () => loadPornoMix(container));
      genreGrid.appendChild(mixBtn);
      const genreBtn = document.createElement('button');
      genreBtn.className = 'category-btn';
      genreBtn.textContent = '🎭 Все жанры';
      genreBtn.addEventListener('click', () => showGenres(container));
      genreGrid.appendChild(genreBtn);
      genreSection.appendChild(genreGrid);
      container.appendChild(genreSection);
    }

    // Инициализация модалок
    const starsModal = document.getElementById('starsModal');
    const starsContainer = document.getElementById('starsContainer');
    const starsModalTitle = document.getElementById('starsModalTitle');
    const closeStarsModal = document.getElementById('closeStarsModal');

    document.getElementById('openStarsBtn').addEventListener('click', () => {
      starsModal.classList.add('open');
      showMainPornoMenu(starsContainer);
    });
    closeStarsModal.addEventListener('click', () => starsModal.classList.remove('open'));
    starsModal.addEventListener('click', (e) => {
      if (e.target === starsModal) starsModal.classList.remove('open');
    });

    // Скачивальщик по ссылке
    const downloadToolModal = document.getElementById('downloadToolModal');
    const closeDownloadToolBtn = document.getElementById('closeDownloadToolBtn');
    document.getElementById('openDownloadToolBtn').addEventListener('click', () => {
      downloadToolModal.classList.add('open');
      document.getElementById('downloadToolMessage').textContent = '';
      document.getElementById('downloadLinkInput').value = '';
    });
    closeDownloadToolBtn.addEventListener('click', () => downloadToolModal.classList.remove('open'));
    downloadToolModal.addEventListener('click', (e) => {
      if (e.target === downloadToolModal) downloadToolModal.classList.remove('open');
    });
    document.getElementById('downloadLinkBtn').addEventListener('click', () => {
      const link = document.getElementById('downloadLinkInput').value.trim();
      if (link) downloadByLink(link);
    });

    // Лента и прочее
    document.addEventListener('play', function(e) {
      const videos = document.querySelectorAll('video');
      videos.forEach(v => { if (v !== e.target) v.pause(); });
    }, true);

    document.addEventListener('click', function(e) {
      if (e.target.tagName === 'VIDEO') {
        e.preventDefault();
        if (e.target.paused) e.target.play();
        else e.target.pause();
      }
    });

    function showErrorRetry(message) {
      const feed = document.getElementById('feed');
      const errDiv = document.createElement('div');
      errDiv.className = 'error-card';
      errDiv.innerHTML = `<p>⚠️ ${message}</p><p>Проверьте интернет или повторите позже.</p><button id="retryBtn">🔄 Повторить</button>`;
      feed.appendChild(errDiv);
      document.getElementById('retryBtn').addEventListener('click', () => {
        errDiv.remove();
        loadAuto();
      });
    }

    let isLoadingAuto = false;
    async function loadAuto() {
      if (isLoadingAuto) return;
      isLoadingAuto = true;
      const loader = document.getElementById('loader');
      loader.style.display = 'block';
      loader.innerHTML = '<div class="skeleton"></div>';

      try {
        const sub = selectNextSub();
        const path = `/r/${sub}/hot.json?limit=12`;
        const json = await jsonp(path, 'redditCallback');
        const posts = json.data.children;
        appendCards(posts, false);
        loader.style.display = 'none';
      } catch (err) {
        console.error(err);
        loader.style.display = 'none';
        showErrorRetry(err.message);
      } finally {
        isLoadingAuto = false;
      }
    }

    let isLoadingSearch = false;
    async function doSearch(query, append = false) {
      if (isLoadingSearch) return;
      if (!query.trim()) return;
      isLoadingSearch = true;
      const loader = document.getElementById('loader');
      loader.style.display = 'block';
      loader.innerHTML = '<div class="skeleton"></div>';

      try {
        const encoded = encodeURIComponent(query + ' nsfw:yes');
        let path = `/search.json?q=${encoded}&limit=15&include_over_18=on`;
        if (append && state.searchAfter) path += `&after=${state.searchAfter}`;
        const json = await jsonp(path, 'redditSearchCallback');
        const children = json.data.children;
        state.searchAfter = json.data.after;
        appendCards(children, !append);
        loader.style.display = 'none';

        if (state.searchAfter && state.mode === 'search') {
          const feed = document.getElementById('feed');
          const existing = document.getElementById('loadMoreBtn');
          if (existing) existing.remove();
          const btn = document.createElement('button');
          btn.id = 'loadMoreBtn';
          btn.textContent = 'Загрузить ещё';
          btn.style.cssText = 'display:block; margin:1rem auto; padding:0.5rem 1rem; background:#d6336c; color:white; border:none; border-radius:20px; cursor:pointer;';
          btn.addEventListener('click', () => {
            btn.remove();
            doSearch(query, true);
          });
          feed.appendChild(btn);
        }
      } catch (err) {
        console.error(err);
        loader.innerHTML = `<div class="error">Ошибка поиска: ${err.message}</div>`;
      } finally {
        isLoadingSearch = false;
      }
    }

    const sentinel = document.createElement('div');
    sentinel.id = 'sentinel';
    sentinel.style.height = '1px';
    document.getElementById('feed').after(sentinel);
    let observer = new IntersectionObserver((entries) => {
      if (entries[0].isIntersecting && state.mode === 'auto' && !isLoadingAuto) loadAuto();
    }, { rootMargin: '400px' });
    observer.observe(sentinel);

    function switchChannel(channel) {
      currentChannel = channel;
      document.getElementById('feed').innerHTML = '';
      const loadMore = document.getElementById('loadMoreBtn');
      if (loadMore) loadMore.remove();
      observer.observe(sentinel);
      loadAuto();
    }

    document.getElementById('channels').addEventListener('click', (e) => {
      if (e.target.classList.contains('channel-btn') && e.target.dataset.channel === 'mix') {
        document.querySelectorAll('.channel-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        switchChannel('mix');
      }
    });

    // Личный кабинет
    const cabinetModal = document.getElementById('cabinetModal');
    document.getElementById('openCabinetBtn').addEventListener('click', () => {
      cabinetModal.classList.add('open');
      renderBookmarksCabinet();
    });
    document.getElementById('closeCabinetBtn').addEventListener('click', () => {
      cabinetModal.classList.remove('open');
    });
    cabinetModal.addEventListener('click', (e) => {
      if (e.target === cabinetModal) cabinetModal.classList.remove('open');
    });

    const modeToggle = document.getElementById('modeToggle');
    const modeLabel = document.getElementById('modeLabel');
    const searchBox = document.getElementById('searchBox');
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const channelsDiv = document.getElementById('channels');

    function setMode(mode) {
      state.mode = mode;
      saveState();
      if (mode === 'search') {
        modeLabel.textContent = 'поиск';
        searchBox.style.display = 'flex';
        channelsDiv.style.display = 'none';
        observer.unobserve(sentinel);
      } else {
        modeLabel.textContent = 'авто-лента';
        searchBox.style.display = 'none';
        channelsDiv.style.display = 'flex';
        document.getElementById('feed').innerHTML = '';
        const loadMore = document.getElementById('loadMoreBtn');
        if (loadMore) loadMore.remove();
        observer.observe(sentinel);
        loadAuto();
      }
    }

    modeToggle.addEventListener('click', () => setMode(state.mode === 'auto' ? 'search' : 'auto'));
    searchBtn.addEventListener('click', () => {
      state.searchAfter = null;
      doSearch(searchInput.value);
    });
    searchInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        state.searchAfter = null;
        doSearch(searchInput.value);
      }
    });

    if (state.mode === 'search') {
      setMode('search');
    } else {
      channelsDiv.style.display = 'flex';
      document.querySelector('.channel-btn[data-channel="mix"]').classList.add('active');
      switchChannel('mix');
    }

    const toTopBtn = document.getElementById('toTopBtn');
    window.addEventListener('scroll', () => {
      toTopBtn.classList.toggle('visible', window.scrollY > 800);
    });
    toTopBtn.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  })();
  </script>
</body>
  </html>
