            attempt++;
            tryLoad();

            if (script.parentNode) script.parentNode.removeChild(script);

    }

    function createBookmarkData(data) {
      const videoInfo = getVideoInfo(data);
      return {
        id: data.id,
        title: data.title || '',
        subreddit: data.subreddit,
        permalink: data.permalink,
        ...videoInfo
      };
    }

    function createCard(post) {
      const data = post.data || post;
      if (!data || data.stickied) return null;
      const title = data.title || '';
      const url = data.url;
      const domain = data.domain;
      const subreddit = data.subreddit;
      const postId = data.id;

      if (state.seenPosts.has(postId) || (url && state.seenUrls.has(url))) return null;
      if (isBlockedContent(title, subreddit)) return null;

      if (currentChannel === 'porno' && !isVideoPost(data)) return null;

      const tags = extractTags(title, subreddit);
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.postId = postId;
      card.dataset.subreddit = subreddit;
      card.dataset.tags = tags.join(',');

      let mediaElement = null;
      let downloadUrl = null;
      let isImage = false;

      if (data.is_video && data.media && data.media.reddit_video) {
        const fallback = data.media.reddit_video.fallback_url;
        const thumbnail = (data.thumbnail && data.thumbnail !== 'self' && data.thumbnail !== 'default') ? data.thumbnail : '';
        downloadUrl = fallback;
        isImage = false;

        mediaElement = document.createElement('video');
        mediaElement.src = fallback;
        mediaElement.controls = true;
        mediaElement.playsInline = true;
        mediaElement.preload = 'metadata';
        if (thumbnail) mediaElement.poster = thumbnail;

        mediaElement.addEventListener('error', () => {
          const permalink = 'https://www.reddit.com' + (data.permalink || '');
          const wrapper = document.createElement('div');
          wrapper.className = 'video-preview';
          if (thumbnail) {
            const img = document.createElement('img');
            img.src = thumbnail; img.alt = title || 'Видео'; img.loading = 'lazy';
            wrapper.appendChild(img);
          } else {
            wrapper.style.background = '#111'; wrapper.style.height = '200px';
            wrapper.style.display = 'flex'; wrapper.style.alignItems = 'center';
            wrapper.style.justifyContent = 'center'; wrapper.style.color = '#888';
            wrapper.textContent = '🎬 Видео';
          }
          wrapper.addEventListener('click', () => window.open(permalink, '_blank'));
          if (mediaElement.parentNode) {
            mediaElement.parentNode.replaceChild(wrapper, mediaElement);
            mediaElement = wrapper;
            const existingBtn = card.querySelector('.download-btn');
            if (existingBtn) existingBtn.remove();
            downloadUrl = null;
          }
        });
      }
      else if (url && domain === 'i.imgur.com' && url.endsWith('.gifv')) {
        const mp4Url = url.replace(/\.gifv$/, '.mp4');
        downloadUrl = mp4Url; isImage = false;
        mediaElement = document.createElement('video');
        mediaElement.src = mp4Url; mediaElement.controls = true;
        mediaElement.playsInline = true; mediaElement.preload = 'metadata';
      }
      else if (domain === 'redgifs.com' || domain === 'www.redgifs.com') {
        const match = url.match(/\/watch\/([a-zA-Z0-9]+)/);
        if (match) {
          const wrapper = document.createElement('div');
          wrapper.className = 'redgifs-preview';
          const preview = document.createElement('img');
          preview.src = `https://thumbs2.redgifs.com/${match[1]}-mobile.jpg`;
          preview.alt = title || 'RedGIFs'; preview.loading = 'lazy';
          downloadUrl = preview.src; isImage = true;
          wrapper.appendChild(preview);
          wrapper.addEventListener('click', () => {
            const iframe = document.createElement('iframe');
            iframe.src = `https://www.redgifs.com/ifr/${match[1]}`;
            iframe.allowFullscreen = true; iframe.allow = 'autoplay; fullscreen';
            iframe.referrerPolicy = 'no-referrer'; iframe.loading = 'lazy';
            wrapper.innerHTML = ''; wrapper.appendChild(iframe);
            wrapper.classList.remove('redgifs-preview');
          });
          mediaElement = wrapper;
        }
      }
      else if (url && (url.match(/\.(jpg|jpeg|png|gif|webp)(\?.*)?$/i) || domain === 'i.redd.it' || domain === 'i.imgur.com')) {
        downloadUrl = url; isImage = true;
        mediaElement = document.createElement('img');
        mediaElement.src = url; mediaElement.alt = title || 'Контент'; mediaElement.loading = 'lazy';
      }

      if (!mediaElement) return null;

      card.appendChild(mediaElement);

      // Флажок закладки только для видео
      if (isVideoPost(data)) {
        const bookmarkBtn = document.createElement('button');
        bookmarkBtn.className = 'bookmark-btn';
        bookmarkBtn.style.display = 'block';
        bookmarkBtn.textContent = '🔖';
        if (isBookmarked(postId)) bookmarkBtn.classList.add('bookmarked');
        bookmarkBtn.addEventListener('click', (e) => {
          e.stopPropagation(); e.preventDefault();
          const added = toggleBookmark(createBookmarkData(data));
          if (added) {
            bookmarkBtn.classList.add('bookmarked');
          } else {
            bookmarkBtn.classList.remove('bookmarked');
          }
        });
        card.appendChild(bookmarkBtn);
      }

      if (downloadUrl) {
        const downloadBtn = document.createElement('button');
        downloadBtn.className = 'download-btn';
        downloadBtn.textContent = '⬇ Скачать';
        downloadBtn.addEventListener('click', (e) => {
          e.stopPropagation(); e.preventDefault();
          if (isImage) {
            const img = mediaElement.tagName === 'IMG' ? mediaElement : mediaElement.querySelector('img');
            if (img && img.complete && img.naturalWidth > 0) {
              const ext = downloadUrl.split('.').pop().split('?')[0] || 'jpg';
              const filename = (title || 'image').replace(/[^a-z0-9]/gi, '_').substring(0, 30) + '.' + ext;
              downloadImage(img, filename);
            } else {
              const tempImg = new Image();
              tempImg.crossOrigin = 'anonymous';
              tempImg.src = downloadUrl;
              tempImg.onload = () => {
                const ext = downloadUrl.split('.').pop().split('?')[0] || 'jpg';
                const filename = (title || 'image').replace(/[^a-z0-9]/gi, '_').substring(0, 30) + '.' + ext;
                downloadImage(tempImg, filename);
              };
              tempImg.onerror = () => window.open(downloadUrl, '_blank');
            }
          } else {
            downloadVideo(downloadUrl);
          }
        });
        card.appendChild(downloadBtn);
      }

      if (title) {
        const cap = document.createElement('div');
        cap.className = 'caption'; cap.textContent = title;
        card.appendChild(cap);
      }

      const actions = document.createElement('div');
      actions.className = 'actions';
      const likeBtn = document.createElement('button');
      likeBtn.innerHTML = '👍 <span>0</span>';
      const dislikeBtn = document.createElement('button');
      dislikeBtn.innerHTML = '👎 <span>0</span>';

      let feedbackRecorded = false;
      likeBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (feedbackRecorded) return;
        feedbackRecorded = true;
        likeBtn.classList.add('liked');
        recordFeedback(postId, subreddit, tags, true);
        updateCounts();
      });
      dislikeBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (feedbackRecorded) return;
        feedbackRecorded = true;
        dislikeBtn.classList.add('disliked');
        recordFeedback(postId, subreddit, tags, false);
        updateCounts();
      });

      function updateCounts() {
        const subW = state.subWeights[subreddit] || {};
        likeBtn.querySelector('span').textContent = subW.likes || 0;
        dislikeBtn.querySelector('span').textContent = subW.dislikes || 0;
      }
      updateCounts();

      actions.appendChild(likeBtn);
      actions.appendChild(dislikeBtn);
      card.appendChild(actions);

      markSeen(postId, url);
      saveState();
      return card;
    }

    function renderBookmarksCabinet() {
      const grid = document.getElementById('cabinetGrid');
      const emptyMsg = document.getElementById('cabinetEmpty');
      grid.innerHTML = '';
      if (state.bookmarks.length === 0) {
        emptyMsg.style.display = 'block';
        return;
      }
      emptyMsg.style.display = 'none';
      state.bookmarks.forEach(bm => {
        const card = document.createElement('div');
        card.className = 'cabinet-card';
        const thumb = bm.thumbnail || '';
        const img = document.createElement('img');
        img.src = thumb;
        img.alt = bm.title;
        card.appendChild(img);
        const cap = document.createElement('div');
        cap.className = 'caption'; cap.textContent = bm.title || 'Без названия';
        card.appendChild(cap);
        const removeBtn = document.createElement('button');
        removeBtn.className = 'remove-btn'; removeBtn.innerHTML = '&times;';
        removeBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          toggleBookmark(bm);
          renderBookmarksCabinet();
        });
        card.appendChild(removeBtn);

        // При клике на карточку — встроить плеер
        card.addEventListener('click', () => {
          if (card.querySelector('video, iframe')) return; // уже играет
          // Очищаем и вставляем плеер
          card.innerHTML = '';
          const removeBtn2 = document.createElement('button');
          removeBtn2.className = 'remove-btn'; removeBtn2.innerHTML = '&times;';
          removeBtn2.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleBookmark(bm);
            renderBookmarksCabinet();
          });
          card.appendChild(removeBtn2);

          if (bm.type === 'redgifs') {
            const iframe = document.createElement('iframe');
            iframe.src = bm.videoUrl;
            iframe.allowFullscreen = true;
            iframe.allow = 'autoplay; fullscreen';
            iframe.referrerPolicy = 'no-referrer';
            iframe.style.width = '100%'; iframe.style.aspectRatio = '16/9';
            card.appendChild(iframe);
          } else {
            const video = document.createElement('video');
            video.src = bm.videoUrl;
            video.controls = true;
            video.playsInline = true;
            video.style.width = '100%'; video.style.height = 'auto';
            video.play();
            card.appendChild(video);
          }
        });

        grid.appendChild(card);
      });
    }

    function appendCards(posts, clear = false) {
      const feed = document.getElementById('feed');
      if (clear) feed.innerHTML = '';

      let filtered = posts;
      if (currentChannel === 'porno') {
        filtered = posts.filter(p => isVideoPost(p.data));
      }
      const shuffled = shuffle([...filtered]);

      const fragment = document.createDocumentFragment();
      shuffled.forEach(post => {
        const card = createCard(post);
        if (card) fragment.appendChild(card);
      });
      feed.appendChild(fragment);

      const cards = feed.querySelectorAll('.card');
      if (cards.length > MAX_DOM_CARDS) {
        for (let i = 0; i < cards.length - MAX_DOM_CARDS; i++) {
          cards[i].remove();
        }
      }
    }

    document.addEventListener('play', function(e) {
      const videos = document.querySelectorAll('video');
      videos.forEach(v => { if (v !== e.target) v.pause(); });
    }, true);

    document.addEventListener('click', function(e) {
      if (e.target.tagName === 'VIDEO') {
        e.preventDefault();
        if (e.target.paused) e.target.play();
        else e.target.pause();
      }
    });

    function showErrorRetry(message) {
      const feed = document.getElementById('feed');
      const errDiv = document.createElement('div');
      errDiv.className = 'error-card';
      errDiv.innerHTML = `<p>⚠️ ${message}</p><p>Проверьте интернет или повторите позже.</p><button id="retryBtn">🔄 Повторить</button>`;
      feed.appendChild(errDiv);
      document.getElementById('retryBtn').addEventListener('click', () => {
        errDiv.remove();
        loadAuto();
      });
    }

    let isLoadingAuto = false;
    async function loadAuto() {
      if (isLoadingAuto || currentChannel === 'bookmarks') return;
      isLoadingAuto = true;
      const loader = document.getElementById('loader');
      loader.style.display = 'block';
      loader.innerHTML = '<div class="skeleton"></div>';

      try {
        const sub = selectNextSub();
        const path = `/r/${sub}/hot.json?limit=12`;
        const json = await jsonp(path, 'redditCallback');
        const posts = json.data.children;
        appendCards(posts, false);
        loader.style.display = 'none';
      } catch (err) {
        console.error(err);
        loader.style.display = 'none';
        showErrorRetry(err.message);
      } finally {
        isLoadingAuto = false;
      }
    }

    let isLoadingSearch = false;
    async function doSearch(query, append = false) {
      if (isLoadingSearch) return;
      if (!query.trim()) return;
      isLoadingSearch = true;
      const loader = document.getElementById('loader');
      loader.style.display = 'block';
      loader.innerHTML = '<div class="skeleton"></div>';

      try {
        const encoded = encodeURIComponent(query + ' nsfw:yes');
        let path = `/search.json?q=${encoded}&limit=15&include_over_18=on`;
        if (append && state.searchAfter) path += `&after=${state.searchAfter}`;
        const json = await jsonp(path, 'redditSearchCallback');
        const children = json.data.children;
        state.searchAfter = json.data.after;
        appendCards(children, !append);
        loader.style.display = 'none';

        if (state.searchAfter && state.mode === 'search') {
          const feed = document.getElementById('feed');
          const existing = document.getElementById('loadMoreBtn');
          if (existing) existing.remove();
          const btn = document.createElement('button');
          btn.id = 'loadMoreBtn';
          btn.textContent = 'Загрузить ещё';
          btn.style.cssText = 'display:block; margin:1rem auto; padding:0.5rem 1rem; background:#d6336c; color:white; border:none; border-radius:20px; cursor:pointer;';
          btn.addEventListener('click', () => {
            btn.remove();
            doSearch(query, true);
          });
          feed.appendChild(btn);
        }
      } catch (err) {
        console.error(err);
        loader.innerHTML = `<div class="error">Ошибка поиска: ${err.message}</div>`;
      } finally {
        isLoadingSearch = false;
      }
    }

    const sentinel = document.createElement('div');
    sentinel.id = 'sentinel';
    sentinel.style.height = '1px';
    document.getElementById('feed').after(sentinel);
    let observer = new IntersectionObserver((entries) => {
      if (entries[0].isIntersecting && state.mode === 'auto' && currentChannel !== 'bookmarks' && !isLoadingAuto) {
        loadAuto();
      }
    }, { rootMargin: '400px' });
    observer.observe(sentinel);

    function switchChannel(channel) {
      currentChannel = channel;
      document.getElementById('feed').innerHTML = '';
      const loadMore = document.getElementById('loadMoreBtn');
      if (loadMore) loadMore.remove();
      if (channel === 'bookmarks') {
        observer.unobserve(sentinel);
        renderBookmarksCabinet();
      } else {
        observer.observe(sentinel);
        loadAuto();
      }
    }

    document.getElementById('channels').addEventListener('click', (e) => {
      if (e.target.classList.contains('channel-btn')) {
        document.querySelectorAll('.channel-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        switchChannel(e.target.dataset.channel);
      }
    });

    // Личный кабинет
    const cabinetModal = document.getElementById('cabinetModal');
    document.getElementById('openCabinetBtn').addEventListener('click', () => {
      cabinetModal.classList.add('open');
      renderBookmarksCabinet();
    });
    document.getElementById('closeCabinetBtn').addEventListener('click', () => {
      cabinetModal.classList.remove('open');
    });
    cabinetModal.addEventListener('click', (e) => {
      if (e.target === cabinetModal) cabinetModal.classList.remove('open');
    });

    const modeToggle = document.getElementById('modeToggle');
    const modeLabel = document.getElementById('modeLabel');
    const searchBox = document.getElementById('searchBox');
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const channelsDiv = document.getElementById('channels');

    function setMode(mode) {
      state.mode = mode;
      saveState();
      if (mode === 'search') {
        modeLabel.textContent = 'поиск';
        searchBox.style.display = 'flex';
        channelsDiv.style.display = 'none';
        observer.unobserve(sentinel);
      } else {
        modeLabel.textContent = 'авто-лента';
        searchBox.style.display = 'none';
        channelsDiv.style.display = 'flex';
        document.getElementById('feed').innerHTML = '';
        const loadMore = document.getElementById('loadMoreBtn');
        if (loadMore) loadMore.remove();
        if (currentChannel !== 'bookmarks') {
          observer.observe(sentinel);
          loadAuto();
        }
      }
    }

    modeToggle.addEventListener('click', () => {
      setMode(state.mode === 'auto' ? 'search' : 'auto');
    });
    searchBtn.addEventListener('click', () => {
      state.searchAfter = null;
      doSearch(searchInput.value);
    });
    searchInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        state.searchAfter = null;
        doSearch(searchInput.value);
      }
    });

    if (state.mode === 'search') {
      setMode('search');
    } else {
      channelsDiv.style.display = 'flex';
      switchChannel(currentChannel);
    }

    const toTopBtn = document.getElementById('toTopBtn');
    window.addEventListener('scroll', () => {
      toTopBtn.classList.toggle('visible', window.scrollY > 800);
    });
    toTopBtn.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  })();
  </script>
</body>
</html>
