<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🜂 CubEros — 3D NSFW Лабиринт</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #000;
      font-family: 'Inter', sans-serif;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }
    #info {
      position: absolute;
      top: 20px;
      left: 20px;
      color: rgba(255,255,255,0.7);
      font-size: 1.2rem;
      z-index: 10;
      letter-spacing: 2px;
      text-shadow: 0 0 10px rgba(0,0,0,0.8);
    }
    #controls {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 1rem;
      z-index: 10;
    }
    .ctrl-btn {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.25);
      color: white;
      padding: 0.8rem 1.8rem;
      border-radius: 30px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.3s;
      letter-spacing: 1px;
    }
    .ctrl-btn:hover {
      background: rgba(255,255,255,0.3);
      box-shadow: 0 0 20px rgba(255,255,255,0.2);
    }
    .ctrl-btn.primary {
      background: #d4af37;
      border-color: #d4af37;
      color: #000;
      box-shadow: 0 0 15px rgba(212,175,55,0.5);
    }
    .lightbox {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.95);
      z-index: 100;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }
    .lightbox img, .lightbox video {
      max-width: 90vw;
      max-height: 80vh;
      object-fit: contain;
      border-radius: 12px;
      box-shadow: 0 0 40px rgba(0,0,0,0.9);
    }
    .lightbox-close {
      position: absolute;
      top: 20px; right: 30px;
      font-size: 2.5rem;
      color: white;
      cursor: pointer;
      z-index: 10;
    }
    .lightbox-actions {
      display: flex;
      gap: 1rem;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <div id="info">✦ CubEros</div>
  <div id="controls">
    <button class="ctrl-btn" id="refreshBtn">🔄 Обновить грани</button>
    <button class="ctrl-btn primary" id="randomBtn">🎲 Случайная грань</button>
  </div>

  <!-- Лайтбокс для просмотра -->
  <div class="lightbox" id="lightbox">
    <span class="lightbox-close" id="closeLightbox">&times;</span>
    <div id="lightboxMedia"></div>
    <div class="lightbox-actions">
      <button class="ctrl-btn" id="prevMediaBtn">← Назад</button>
      <button class="ctrl-btn" id="nextMediaBtn">Вперёд →</button>
    </div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // Сабреддиты для получения изображений
    const SUBREDDITS = [
      'gentlemanboners', 'classysexy', 'ArtGW', 'Boudoir', 'FineArtNudes', 'ElegantNudes',
      'GoneWild', 'RealGirls', 'PetiteGoneWild', 'AltGirls', 'gothsluts', 'redhead', 'Blonde',
      'Amateur', 'gwpublic', 'holdthemoan', 'onoff', 'porn', 'nsfw', 'cumsluts', 'anal'
    ];

    // Получение случайного изображения из сабреддита
    async function fetchRandomImage(sub) {
      const url = `https://www.reddit.com/r/${sub}/hot.json?limit=15`;
      try {
        const resp = await fetch(url);
        const data = await resp.json();
        const children = data.data.children;
        // Отфильтровать посты с изображениями
        const images = [];
        for (let child of children) {
          const post = child.data;
          if (post.url && post.url.match(/\.(jpg|jpeg|png|gif|webp)$/i) || 
              post.domain === 'i.redd.it' || post.domain === 'i.imgur.com') {
            images.push(post.url);
          } else if (post.is_video || post.domain === 'redgifs.com') {
            // видео пока пропускаем для куба
          }
          if (images.length >= 3) break;
        }
        return images.length ? images[Math.floor(Math.random() * images.length)] : null;
      } catch (e) {
        return null;
      }
    }

    // Основная сцена
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a0f);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(3, 2, 5);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // производительность
    document.body.appendChild(renderer.domElement);

    // Управление
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.rotateSpeed = 0.5;
    controls.enableZoom = true;
    controls.zoomSpeed = 0.8;
    controls.minDistance = 3;
    controls.maxDistance = 8;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.8;

    // Освещение
    const ambientLight = new THREE.AmbientLight(0x404066);
    scene.add(ambientLight);
    const pointLight = new THREE.PointLight(0xffaa88, 0.8, 10);
    pointLight.position.set(2, 3, 4);
    scene.add(pointLight);
    const backLight = new THREE.PointLight(0x4466aa, 0.5, 10);
    backLight.position.set(-2, -1, -3);
    scene.add(backLight);

    // Куб с 6 гранями
    const geometry = new THREE.BoxGeometry(2, 2, 2);
    const materials = [
      new THREE.MeshStandardMaterial({ color: 0x111122, roughness: 0.4, metalness: 0.1 }),
      new THREE.MeshStandardMaterial({ color: 0x111122, roughness: 0.4, metalness: 0.1 }),
      new THREE.MeshStandardMaterial({ color: 0x111122, roughness: 0.4, metalness: 0.1 }),
      new THREE.MeshStandardMaterial({ color: 0x111122, roughness: 0.4, metalness: 0.1 }),
      new THREE.MeshStandardMaterial({ color: 0x111122, roughness: 0.4, metalness: 0.1 }),
      new THREE.MeshStandardMaterial({ color: 0x111122, roughness: 0.4, metalness: 0.1 })
    ];
    const cube = new THREE.Mesh(geometry, materials);
    scene.add(cube);

    // Каркас (проволочный)
    const wireframe = new THREE.LineSegments(
      new THREE.EdgesGeometry(geometry),
      new THREE.LineBasicMaterial({ color: 0x88aacc, linewidth: 0.5 })
    );
    cube.add(wireframe);

    // Сетка для эффекта
    const gridHelper = new THREE.GridHelper(5, 20, 0x222244, 0x111122);
    scene.add(gridHelper);

    // Массив загруженных URL для граней
    let faceImages = Array(6).fill(null);

    // Загрузка текстур на грани
    async function loadFaces() {
      // Показываем загрузку
      const promises = [];
      for (let i = 0; i < 6; i++) {
        const sub = SUBREDDITS[Math.floor(Math.random() * SUBREDDITS.length)];
        promises.push(fetchRandomImage(sub));
      }
      const urls = await Promise.all(promises);
      faceImages = urls.map((url, idx) => url || null);

      // Удаляем старые текстуры
      cube.material.forEach((mat, i) => {
        if (mat.map) {
          mat.map.dispose();
          mat.map = null;
        }
        mat.color.set(0x111122);
        mat.needsUpdate = true;
      });

      // Загружаем новые текстуры
      for (let i = 0; i < 6; i++) {
        if (faceImages[i]) {
          new THREE.TextureLoader().load(faceImages[i], (texture) => {
            cube.material[i].map = texture;
            cube.material[i].color.set(0xffffff);
            cube.material[i].needsUpdate = true;
          }, undefined, () => {
            // fallback при ошибке
            cube.material[i].color.set(0x224466);
          });
        } else {
          cube.material[i].color.set(0x224466);
        }
      }
    }

    // Клик по кубу для показа грани
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    renderer.domElement.addEventListener('click', (event) => {
      // Вычисляем позицию мыши в нормализованных координатах
      mouse.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
      mouse.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObject(cube);
      if (intersects.length > 0) {
        const face = intersects[0].face;
        const materialIndex = face.materialIndex;
        const url = faceImages[materialIndex];
        if (url) {
          openLightbox(url);
        }
      }
    });

    // Функции лайтбокса
    const lightbox = document.getElementById('lightbox');
    const lightboxMedia = document.getElementById('lightboxMedia');
    const closeBtn = document.getElementById('closeLightbox');
    const prevBtn = document.getElementById('prevMediaBtn');
    const nextBtn = document.getElementById('nextMediaBtn');
    let currentLightboxIndex = -1;

    function openLightbox(url) {
      currentLightboxIndex = faceImages.indexOf(url);
      showMedia(url);
      lightbox.style.display = 'flex';
    }

    function showMedia(url) {
      lightboxMedia.innerHTML = '';
      const img = new Image();
      img.src = url;
      img.style.maxWidth = '90vw';
      img.style.maxHeight = '80vh';
      img.style.objectFit = 'contain';
      img.style.borderRadius = '12px';
      lightboxMedia.appendChild(img);
    }

    function navigateLightbox(direction) {
      if (currentLightboxIndex === -1) return;
      let newIndex = currentLightboxIndex + direction;
      if (newIndex < 0) newIndex = 5;
      if (newIndex > 5) newIndex = 0;
      // Ищем следующую грань с изображением
      let attempts = 0;
      while (!faceImages[newIndex] && attempts < 6) {
        newIndex += direction;
        if (newIndex < 0) newIndex = 5;
        if (newIndex > 5) newIndex = 0;
        attempts++;
      }
      if (faceImages[newIndex]) {
        currentLightboxIndex = newIndex;
        showMedia(faceImages[newIndex]);
      }
    }

    closeBtn.addEventListener('click', () => { lightbox.style.display = 'none'; });
    lightbox.addEventListener('click', (e) => { if (e.target === lightbox) lightbox.style.display = 'none'; });
    prevBtn.addEventListener('click', () => navigateLightbox(-1));
    nextBtn.addEventListener('click', () => navigateLightbox(1));

    // Кнопки управления
    document.getElementById('refreshBtn').addEventListener('click', loadFaces);
    document.getElementById('randomBtn').addEventListener('click', () => {
      // Автоматический поворот к случайной грани и открытие
      const idx = Math.floor(Math.random() * 6);
      // Можно анимировать камеру, но для простоты просто откроем грань
      if (faceImages[idx]) {
        openLightbox(faceImages[idx]);
      } else {
        loadFaces().then(() => {
          if (faceImages[idx]) openLightbox(faceImages[idx]);
        });
      }
    });

    // Анимация
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    // Обработка ресайза
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Первоначальная загрузка
    loadFaces();
  </script>
</body>
</html>
