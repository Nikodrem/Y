<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>✨ GlassFlow — Умная лента</title>
  <style>
    :root {
      --bg: #0c0c14;
      --surface: rgba(20, 20, 35, 0.75);
      --surface-light: rgba(30, 30, 50, 0.8);
      --primary: #b794f4;
      --primary-glow: rgba(183, 148, 244, 0.5);
      --accent: #f472b6;
      --text: #e9e9f0;
      --text-muted: #9898b0;
      --border: rgba(255, 255, 255, 0.08);
      --radius: 20px;
      --radius-sm: 12px;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
      --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overscroll-behavior: none;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Фоновый эффект */
    .bg-glow {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 50% 10%, rgba(183, 148, 244, 0.15), transparent 60%),
                  radial-gradient(circle at 80% 20%, rgba(244, 114, 182, 0.1), transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    header {
      width: 100%;
      max-width: 800px;
      padding: 1rem 1.5rem;
      background: rgba(12, 12, 20, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 16px rgba(0,0,0,0.5);
    }

    .logo {
      font-size: 1.6rem;
      font-weight: 600;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .nav-actions {
      display: flex;
      gap: 0.5rem;
    }

    .icon-btn {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 50%;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 1.3rem;
      cursor: pointer;
      transition: var(--transition);
    }
    .icon-btn:hover { background: rgba(255,255,255,0.1); color: white; }
    .icon-btn.active { background: var(--primary); border-color: var(--primary); color: white; }

    main {
      flex: 1;
      width: 100%;
      max-width: 800px;
      padding: 1rem 1rem 5rem;
      position: relative;
      z-index: 1;
    }

    /* Плавающая нижняя навигация */
    .bottom-nav {
      position: fixed;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(20, 20, 35, 0.85);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border);
      border-radius: 40px;
      display: flex;
      gap: 0.2rem;
      padding: 0.5rem 1rem;
      z-index: 30;
      box-shadow: var(--shadow);
    }

    .nav-pill {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.6rem 1.2rem;
      border-radius: 30px;
      font-weight: 500;
      font-size: 0.9rem;
      color: var(--text-muted);
      background: transparent;
      border: none;
      cursor: pointer;
      transition: var(--transition);
      white-space: nowrap;
    }
    .nav-pill.active {
      background: var(--primary);
      color: white;
      box-shadow: 0 0 16px var(--primary-glow);
    }
    .nav-pill:hover:not(.active) { color: white; background: rgba(255,255,255,0.05); }

    .feed-container {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    .card {
      background: var(--surface);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform var(--transition), border-color var(--transition);
      cursor: pointer;
    }
    .card:hover { transform: translateY(-2px); border-color: rgba(255,255,255,0.15); }

    .media-wrapper {
      position: relative;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      max-height: 70vh;
      overflow: hidden;
    }
    .media-wrapper img,
    .media-wrapper video {
      width: 100%;
      height: auto;
      max-height: 70vh;
      object-fit: contain;
      display: block;
    }
    .media-wrapper iframe {
      width: 100%;
      aspect-ratio: 16/9;
      height: auto;
      border: none;
    }

    .card-body {
      padding: 0.8rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }
    .card-title {
      font-weight: 500;
      font-size: 0.95rem;
      color: var(--text);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: var(--text-muted);
      font-size: 0.8rem;
    }
    .card-actions {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }
    .action-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text-muted);
      padding: 0.4rem 1rem;
      border-radius: 20px;
      font-size: 0.85rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      transition: var(--transition);
    }
    .action-btn:hover { background: rgba(255,255,255,0.12); }
    .action-btn.liked { background: #2d5a27; border-color: #4caf50; color: white; }
    .action-btn.disliked { background: #5a2727; border-color: #f44336; color: white; }

    .download-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      border: none;
      border-radius: 30px;
      color: white;
      padding: 0.5rem 1rem;
      font-size: 0.8rem;
      cursor: pointer;
      opacity: 0;
      transition: opacity var(--transition);
      z-index: 5;
    }
    .media-wrapper:hover .download-btn { opacity: 1; }

    .bookmark-btn {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      border: none;
      border-radius: 30px;
      color: white;
      width: 36px;
      height: 36px;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0;
      transition: opacity var(--transition);
      z-index: 5;
    }
    .media-wrapper:hover .bookmark-btn { opacity: 1; }
    .bookmark-btn.bookmarked { background: var(--accent); }

    /* Модальные окна */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(20px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--transition);
    }
    .modal.open { opacity: 1; pointer-events: auto; }
    .modal-content {
      background: var(--surface-light);
      border-radius: var(--radius);
      padding: 2rem;
      max-width: 700px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      position: relative;
    }
    .modal-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1.8rem;
      cursor: pointer;
      transition: var(--transition);
    }
    .modal-close:hover { color: white; }

    .grid-2col {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1rem;
      margin-top: 1rem;
    }
    .bookmark-card {
      background: rgba(0,0,0,0.3);
      border-radius: var(--radius-sm);
      overflow: hidden;
      cursor: pointer;
      transition: var(--transition);
    }
    .bookmark-card:hover { transform: scale(1.02); }
    .bookmark-card img { width: 100%; aspect-ratio: 16/10; object-fit: cover; }

    .search-box {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .search-box input {
      flex: 1;
      padding: 0.8rem 1rem;
      border-radius: 30px;
      background: rgba(255,255,255,0.08);
      border: 1px solid var(--border);
      color: white;
      font-size: 1rem;
    }
    .btn {
      padding: 0.7rem 1.5rem;
      border-radius: 30px;
      background: var(--primary);
      border: none;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
    }
    .btn:hover { box-shadow: 0 0 20px var(--primary-glow); }

    .loading-skeleton {
      width: 100%;
      height: 300px;
      background: linear-gradient(90deg, #1e1e2e 25%, #2a2a3a 50%, #1e1e2e 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: var(--radius);
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    .to-top {
      position: fixed;
      bottom: 100px;
      right: 20px;
      width: 44px;
      height: 44px;
      background: var(--primary);
      border-radius: 50%;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity var(--transition);
      z-index: 25;
    }
    .to-top.visible { opacity: 1; }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">

</head>
<body>
  <div class="bg-glow"></div>

        <input type="text" id="downloadLinkInput" placeholder="Ссылка Reddit, RedGIFs, Imgur...">
        <button class="btn" id="watchBtn">Смотреть</button>
      </div>
      <video id="downloadPlayer" controls style="width:100%; max-height:50vh; display:none; border-radius:var(--radius-sm);"></video>
      <progress id="downloadProgress" value="0" max="100" style="width:100%; display:none; margin:0.5rem 0;"></progress>
      <button class="btn" id="saveBtn" style="display:none;">💾 Сохранить</button>
      <div id="dlMsg" style="margin-top:0.5rem; color:var(--text-muted);"></div>

    ];

    const GENRES = [
      { emoji: '💦', name: 'Сквирт', query: 'squirt' },
      { emoji: '🍑', name: 'Анал', query: 'anal' },
      { emoji: '👄', name: 'Минет', query: 'blowjob' },

      { emoji: '💧', name: 'Кремпай', query: 'creampie' },
      { emoji: '👩‍❤️‍💋‍👩', name: 'Лесби', query: 'lesbian' },
      { emoji: '🌸', name: 'Соло', query: 'masturbation' },
      { emoji: '⛓️', name: 'БДСМ', query: 'bdsm' },
      { emoji: '👥', name: 'Групповое', query: 'gangbang' },
      { emoji: '💥', name: 'Оргазм', query: 'orgasm' },
      { emoji: '🎞️', name: 'Компиляции', query: 'compilation' },
      { emoji: '💕', name: 'Нежное', query: 'passionate' }
    ];

    const BLOCKLIST = /(gore|blood|murder|death|kill|violen|убийств|смерт|насил|труп|femboy|trap|trans|shemale|фембой|транс)/i;

    // ========== Состояние ==========
    const STORAGE_KEY = 'glassflow_state';
    let state = {
      seenPosts: new Set(),
      seenUrls: new Set(),
      bookmarks: [],
      likes: {},
      activeTab: 'feed',
      feedMode: 'mixed', // mixed | subreddit | search
      searchQuery: '',
      searchAfter: null
    };

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          const saved = JSON.parse(raw);
          state.bookmarks = saved.bookmarks || [];
          state.likes = saved.likes || {};
          if (saved.seenPosts) state.seenPosts = new Set(saved.seenPosts);
          if (saved.seenUrls) state.seenUrls = new Set(saved.seenUrls);
        }
      } catch (e) {}
    }
    function saveState() {
      const toSave = {
        bookmarks: state.bookmarks,
        likes: state.likes,
        seenPosts: Array.from(state.seenPosts).slice(-2000),
        seenUrls: Array.from(state.seenUrls).slice(-2000)
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave));
    }
    loadState();

    // ========== API (JSONP) ==========
    function jsonp(url, callbackName, timeout = 12000) {
      return new Promise((resolve, reject) => {
        const bases = ['https://www.reddit.com', 'https://old.reddit.com'];
        let attempt = 0;
        function tryLoad() {
          if (attempt >= bases.length) return reject(new Error('JSONP failed'));
          const base = bases[attempt];
          const script = document.createElement('script');
          const fullUrl = base + url + (url.includes('?') ? '&' : '?') + 'jsonp=' + callbackName + '&_=' + Date.now();
          const timer = setTimeout(() => {
            cleanup();
            attempt++;
            tryLoad();
          }, timeout);
          function cleanup() {
            clearTimeout(timer);
            delete window[callbackName];
            if (script.parentNode) script.parentNode.removeChild(script);
          }
          window[callbackName] = (data) => {
            cleanup();
            resolve(data);
          };
          script.onerror = () => {
            cleanup();
            attempt++;
            tryLoad();
          };
          script.src = fullUrl;
          document.head.appendChild(script);
        }
        tryLoad();
      });
    }

    // ========== Загрузка постов ==========
    async function fetchPosts(subreddit, limit = 15, after = null) {
      let path = `/r/${subreddit}/hot.json?limit=${limit}`;
      if (after) path += `&after=${after}`;
      const data = await jsonp(path, 'feedCB');
      return data.data.children;
    }

    async function searchPosts(query, limit = 20, after = null) {
      const q = encodeURIComponent(query + ' nsfw:yes');
      let path = `/search.json?q=${q}&limit=${limit}&include_over_18=on&sort=new`;
      if (after) path += `&after=${after}`;
      const data = await jsonp(path, 'searchCB');
      return data.data.children;
    }

    // ========== Рендер карточки ==========
    function createCard(post) {
      const data = post.data;
      if (!data || data.stickied) return null;
      if (state.seenPosts.has(data.id) || (data.url && state.seenUrls.has(data.url))) return null;
      if (BLOCKLIST.test(data.title + ' ' + data.subreddit)) return null;

      state.seenPosts.add(data.id);
      if (data.url) state.seenUrls.add(data.url);

      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.id = data.id;

      const wrapper = document.createElement('div');
      wrapper.className = 'media-wrapper';

      let mediaEl;
      const isVideo = data.is_video || data.url?.match(/\.(mp4|webm|gifv|mov)$/i) || data.domain === 'redgifs.com';

      if (data.is_video && data.media?.reddit_video?.fallback_url) {
        mediaEl = document.createElement('video');
        mediaEl.src = data.media.reddit_video.fallback_url;
        mediaEl.controls = true;
        mediaEl.preload = 'metadata';
        if (data.thumbnail && data.thumbnail !== 'self') mediaEl.poster = data.thumbnail;
      } else if (data.domain === 'redgifs.com' || data.domain === 'www.redgifs.com') {
        const match = data.url.match(/\/watch\/([a-zA-Z0-9]+)/);
        if (match) {
          const iframe = document.createElement('iframe');
          iframe.src = `https://www.redgifs.com/ifr/${match[1]}`;
          iframe.allowFullscreen = true;
          iframe.allow = 'autoplay; fullscreen';
          mediaEl = iframe;
        }
      } else if (data.url?.match(/\.(jpg|jpeg|png|gif|webp)$/i) || data.domain === 'i.redd.it' || data.domain === 'i.imgur.com') {
        mediaEl = document.createElement('img');
        mediaEl.src = data.url;
        mediaEl.loading = 'lazy';
      } else if (data.url?.endsWith('.gifv')) {
        mediaEl = document.createElement('video');
        mediaEl.src = data.url.replace(/\.gifv$/, '.mp4');
        mediaEl.controls = true;
      } else if (data.url?.match(/\.(mp4|webm|mov)$/i)) {
        mediaEl = document.createElement('video');
        mediaEl.src = data.url;
        mediaEl.controls = true;
      } else {
        // пропускаем неподдерживаемое
        return null;
      }

      wrapper.appendChild(mediaEl);

      // Кнопка скачать
      const dlBtn = document.createElement('button');
      dlBtn.className = 'download-btn';
      dlBtn.textContent = '⬇️';
      dlBtn.onclick = (e) => {
        e.stopPropagation();
        if (mediaEl.tagName === 'IMG') {
          const a = document.createElement('a');
          a.href = mediaEl.src;
          a.download = '';
          a.click();
        } else if (mediaEl.src) {
          window.open(mediaEl.src, '_blank');
        } else if (mediaEl.tagName === 'IFRAME') {
          window.open(mediaEl.src, '_blank');
        }
      };
      wrapper.appendChild(dlBtn);

      // Закладка
      const bmBtn = document.createElement('button');
      bmBtn.className = 'bookmark-btn';
      bmBtn.textContent = '🔖';
      if (state.bookmarks.some(b => b.id === data.id)) bmBtn.classList.add('bookmarked');
      bmBtn.onclick = (e) => {
        e.stopPropagation();
        toggleBookmark(data);
        bmBtn.classList.toggle('bookmarked');
      };
      wrapper.appendChild(bmBtn);

      card.appendChild(wrapper);

      const body = document.createElement('div');
      body.className = 'card-body';
      body.innerHTML = `
        <div class="card-title">${data.title || 'Без названия'}</div>
        <div class="card-meta">
          <span>r/${data.subreddit}</span>
          <div class="card-actions">
            <button class="action-btn like-btn">👍 ${state.likes[data.id]?.likes || 0}</button>
            <button class="action-btn dislike-btn">👎 ${state.likes[data.id]?.dislikes || 0}</button>
          </div>
        </div>
      `;

      const likeBtn = body.querySelector('.like-btn');
      const dislikeBtn = body.querySelector('.dislike-btn');
      let feedbackDone = false;
      likeBtn.onclick = (e) => {
        e.stopPropagation();
        if (feedbackDone) return;
        feedbackDone = true;
        likeBtn.classList.add('liked');
        recordLike(data.id, true);
        updateCounters();
      };
      dislikeBtn.onclick = (e) => {
        e.stopPropagation();
        if (feedbackDone) return;
        feedbackDone = true;
        dislikeBtn.classList.add('disliked');
        recordLike(data.id, false);
        updateCounters();
      };
      function updateCounters() {
        const likes = state.likes[data.id]?.likes || 0;
        const dislikes = state.likes[data.id]?.dislikes || 0;
        likeBtn.textContent = `👍 ${likes}`;
        dislikeBtn.textContent = `👎 ${dislikes}`;
      }

      card.appendChild(body);
      return card;
    }

    function toggleBookmark(data) {
      const idx = state.bookmarks.findIndex(b => b.id === data.id);
      if (idx > -1) state.bookmarks.splice(idx, 1);
      else {
        const bm = {
          id: data.id,
          title: data.title,
          thumbnail: data.thumbnail,
          url: data.url,
          subreddit: data.subreddit,
          isVideo: data.is_video || data.domain === 'redgifs.com',
          media: data.is_video ? data.media?.reddit_video?.fallback_url : null
        };
        state.bookmarks.unshift(bm);
      }
      saveState();
    }

    function recordLike(postId, liked) {
      if (!state.likes[postId]) state.likes[postId] = { likes: 0, dislikes: 0 };
      liked ? state.likes[postId].likes++ : state.likes[postId].dislikes++;
      saveState();
    }

    // ========== Лента ==========
    let feedLoading = false;
    async function loadFeed(clear = false) {
      if (feedLoading) return;
      feedLoading = true;
      const loader = document.getElementById('loader');
      loader.style.display = 'block';
      const feedEl = document.getElementById('feed');
      if (clear) feedEl.innerHTML = '';

      try {
        let posts;
        if (state.feedMode === 'search' && state.searchQuery) {
          posts = await searchPosts(state.searchQuery, 15, state.searchAfter);
          state.searchAfter = posts.length ? posts[posts.length-1].data.name : null;
        } else {
          const sub = ALL_SUBS[Math.floor(Math.random() * ALL_SUBS.length)];
          posts = await fetchPosts(sub);
        }
        const fragment = document.createDocumentFragment();
        posts.forEach(p => {
          const card = createCard(p);
          if (card) fragment.appendChild(card);
        });
        feedEl.appendChild(fragment);
      } catch (e) {
        feedEl.innerHTML += '<div style="color:red; padding:1rem;">Ошибка загрузки</div>';
      }
      loader.style.display = 'none';
      feedLoading = false;
    }

    // Бесконечный скролл
    const sentinel = document.createElement('div');
    sentinel.id = 'sentinel';
    document.querySelector('main').appendChild(sentinel);
    new IntersectionObserver((entries) => {
      if (entries[0].isIntersecting && state.activeTab === 'feed') loadFeed();
    }, { rootMargin: '600px' }).observe(sentinel);

    // ========== UI переключения ==========
    const bottomNav = document.getElementById('bottomNav');
    bottomNav.addEventListener('click', (e) => {
      const pill = e.target.closest('.nav-pill');
      if (!pill) return;
      document.querySelectorAll('.nav-pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      state.activeTab = pill.dataset.tab;
      handleTabSwitch(state.activeTab);
    });

    function handleTabSwitch(tab) {
      const feed = document.getElementById('feed');
      feed.innerHTML = '';
      switch(tab) {
        case 'feed':
          state.feedMode = 'mixed';
          loadFeed(true);
          break;
        case 'stars':
          openStarsCatalog();
          break;
        case 'genres':
          openGenresCatalog();
          break;
        case 'more':
          openMoreCatalog();
          break;
      }
    }

    // ========== Каталоги ==========
    function openStarsCatalog() {
      const modal = document.getElementById('catalogModal');
      const content = document.getElementById('catalogContent');
      content.innerHTML = '<h3>⭐ Популярные актрисы</h3><div class="grid-2col"></div>';
      const grid = content.querySelector('.grid-2col');
      STARS.forEach(star => {
        const card = document.createElement('div');
        card.className = 'bookmark-card';
        card.innerHTML = `<div style="padding:1rem; text-align:center; background:rgba(0,0,0,0.3); border-radius:12px;">${star.name}</div>`;
        card.onclick = () => startStarFeed(star);
        grid.appendChild(card);
      });
      modal.classList.add('open');
    }

    function openGenresCatalog() {
      const modal = document.getElementById('catalogModal');
      const content = document.getElementById('catalogContent');
      content.innerHTML = '<h3>🎭 Жанры</h3><div class="grid-2col"></div>';
      const grid = content.querySelector('.grid-2col');
      GENRES.forEach(genre => {
        const card = document.createElement('div');
        card.className = 'bookmark-card';
        card.innerHTML = `<div style="padding:1rem; text-align:center;">${genre.emoji} ${genre.name}</div>`;
        card.onclick = () => startGenreFeed(genre);
        grid.appendChild(card);
      });
      modal.classList.add('open');
    }

    function openMoreCatalog() {
      const modal = document.getElementById('catalogModal');
      const content = document.getElementById('catalogContent');
      content.innerHTML = `
        <h3>📂 Дополнительно</h3>
        <div style="display:flex; flex-direction:column; gap:0.8rem; margin-top:1rem;">
          <button class="btn" id="loadAestheticBtn">🎨 Эстетика</button>
          <button class="btn" id="loadAmateurBtn">🏠 Любительское</button>
          <button class="btn" id="loadCouplesBtn">💑 Пары</button>
          <button class="btn" id="loadHardcoreBtn">🔥 Хардкор</button>
        </div>
      `;
      modal.classList.add('open');
      content.querySelector('#loadAestheticBtn').onclick = () => loadCategory('aesthetic');
      content.querySelector('#loadAmateurBtn').onclick = () => loadCategory('amateur');
      content.querySelector('#loadCouplesBtn').onclick = () => loadCategory('couples');
      content.querySelector('#loadHardcoreBtn').onclick = () => loadCategory('hardcore');
    }

    function loadCategory(cat) {
      closeModal('catalogModal');
      state.activeTab = 'feed';
      document.querySelector('.nav-pill[data-tab="feed"]').classList.add('active');
      const sub = SUBREDDITS[cat][Math.floor(Math.random() * SUBREDDITS[cat].length)];
      state.feedMode = 'subreddit';
      document.getElementById('feed').innerHTML = '';
      fetchPosts(sub, 20).then(posts => {
        const fragment = document.createDocumentFragment();
        posts.forEach(p => {
          const card = createCard(p);
          if (card) fragment.appendChild(card);
        });
        document.getElementById('feed').appendChild(fragment);
      });
    }

    function startStarFeed(star) {
      closeModal('catalogModal');
      state.activeTab = 'feed';
      document.querySelector('.nav-pill[data-tab="feed"]').classList.add('active');
      state.feedMode = 'search';
      state.searchQuery = star.tags;
      state.searchAfter = null;
      document.getElementById('feed').innerHTML = '';
      loadFeed(true);
    }

    function startGenreFeed(genre) {
      closeModal('catalogModal');
      state.activeTab = 'feed';
      document.querySelector('.nav-pill[data-tab="feed"]').classList.add('active');
      state.feedMode = 'search';
      state.searchQuery = genre.query;
      state.searchAfter = null;
      document.getElementById('feed').innerHTML = '';
      loadFeed(true);
    }

    function closeModal(id) {
      document.getElementById(id).classList.remove('open');
    }

    // ========== Модалки ==========
    document.getElementById('openCabinetBtn').onclick = () => {
      const grid = document.getElementById('bookmarksGrid');
      grid.innerHTML = '';
      if (state.bookmarks.length === 0) {
        document.getElementById('bookmarksEmpty').style.display = 'block';
      } else {
        document.getElementById('bookmarksEmpty').style.display = 'none';
        state.bookmarks.forEach(bm => {
          const card = document.createElement('div');
          card.className = 'bookmark-card';
          card.innerHTML = `<img src="${bm.thumbnail || ''}" onerror="this.style.display='none'"><div style="padding:0.5rem; font-size:0.8rem;">${bm.title?.slice(0,40) || ''}</div>`;
          card.onclick = () => {
            // Воспроизвести
            alert('Просмотр закладки (в реальном приложении открыли бы плеер)');
          };
          grid.appendChild(card);
        });
      }
      document.getElementById('cabinetModal').classList.add('open');
    };
    document.getElementById('closeCabinetModal').onclick = () => closeModal('cabinetModal');

    document.getElementById('openSearchBtn').onclick = () => {
      const panel = document.getElementById('searchPanel');
      panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
    };
    document.getElementById('searchBtn').onclick = () => {
      const q = document.getElementById('searchInput').value.trim();
      if (!q) return;
      state.feedMode = 'search';
      state.searchQuery = q;
      state.searchAfter = null;
      document.getElementById('feed').innerHTML = '';
      loadFeed(true);
    };

    // Инструмент загрузки
    document.getElementById('openDownloadToolBtn').onclick = () => {
      document.getElementById('downloadToolModal').classList.add('open');
    };
    document.getElementById('closeDownloadToolModal').onclick = () => closeModal('downloadToolModal');
    document.getElementById('watchBtn').onclick = async () => {
      const url = document.getElementById('downloadLinkInput').value.trim();
      // упрощённая реализация
      document.getElementById('dlMsg').textContent = 'Функция в разработке. Используйте кнопку "Скачать" на карточках.';
    };

    // Кнопка наверх
    window.addEventListener('scroll', () => {
      document.getElementById('toTopBtn').classList.toggle('visible', scrollY > 700);
    });
    document.getElementById('toTopBtn').onclick = () => window.scrollTo({top:0, behavior:'smooth'});

    // Старт
    loadFeed(true);
  })();
  </script>
</body>
</html>
