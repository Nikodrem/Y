<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🜂 Obsidian Dream — NSFW AI Генератор</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121c;
      --accent: #b44bff;
      --accent2: #ff4d7a;
      --text: #e0e0f0;
      --muted: #6b6b80;
      --radius: 24px;
      --shadow: 0 0 30px rgba(180, 75, 255, 0.3);
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Основной контейнер — фиксирован, без скролла */
    .app {
      width: 100%;
      max-width: 700px;
      height: 100%;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border-radius: 0;
      box-shadow: var(--shadow), 0 8px 24px rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.08);
      overflow: hidden;
      position: relative;
    }

    @media (min-width: 600px) {
      .app {
        border-radius: 32px;
        height: 95%;
        max-height: 900px;
        margin: 0 1rem;
      }
    }

    /* Шапка */
    .header {
      padding: 1.5rem 1.5rem 0.8rem;
      text-align: center;
      flex-shrink: 0;
    }
    .logo {
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: 2px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 8px rgba(180,75,255,0.5));
    }
    .subtitle {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 0.2rem;
    }

    /* Блок ввода */
    .input-group {
      display: flex;
      padding: 0 1.5rem 1rem;
      gap: 0.5rem;
      flex-shrink: 0;
    }
    .prompt-input {
      flex: 1;
      padding: 0.8rem 1.2rem;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 30px;
      color: white;
      font-size: 0.95rem;
      outline: none;
      transition: 0.3s;
    }
    .prompt-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 12px rgba(180,75,255,0.2);
    }
    .generate-btn {
      padding: 0.8rem 1.5rem;
      background: var(--accent);
      border: none;
      border-radius: 30px;
      color: white;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      box-shadow: 0 4px 15px rgba(180,75,255,0.4);
      white-space: nowrap;
    }
    .generate-btn:hover {
      background: #c56bff;
      box-shadow: 0 6px 20px rgba(180,75,255,0.6);
    }
    .generate-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      box-shadow: none;
    }

    /* Зона результата */
    .result-area {
      flex: 1;
      margin: 0 1.5rem 1rem;
      position: relative;
      background: rgba(0,0,0,0.3);
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px dashed rgba(255,255,255,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .result-area img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: block;
      border-radius: var(--radius);
    }
    .placeholder {
      color: var(--muted);
      text-align: center;
      padding: 1rem;
      font-size: 0.95rem;
    }
    .loading-spinner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      color: var(--muted);
    }
    .spinner {
      width: 44px;
      height: 44px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Кнопки действий под результатом */
    .action-buttons {
      display: flex;
      justify-content: center;
      gap: 0.6rem;
      padding: 0 1.5rem 0.5rem;
      flex-shrink: 0;
    }
    .icon-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text);
      padding: 0.5rem 1rem;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    .icon-btn:hover {
      background: rgba(255,255,255,0.12);
    }

    /* История */
    .history {
      padding: 0 1.5rem 1rem;
      flex-shrink: 0;
      overflow-y: auto;
      max-height: 120px;
    }
    .history-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.3rem;
      font-weight: 600;
      font-size: 0.9rem;
    }
    .clear-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.8rem;
    }
    .history-grid {
      display: flex;
      gap: 0.5rem;
      flex-wrap: nowrap;
      overflow-x: auto;
      padding-bottom: 0.3rem;
    }
    .history-thumb {
      width: 70px;
      height: 70px;
      border-radius: 10px;
      object-fit: cover;
      cursor: pointer;
      border: 1px solid transparent;
      flex-shrink: 0;
      transition: 0.2s;
    }
    .history-thumb:hover {
      border-color: var(--accent);
      transform: scale(1.05);
    }

    /* Полноэкранный просмотр */
    .lightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      backdrop-filter: blur(8px);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .lightbox img {
      max-width: 95vw;
      max-height: 95vh;
      object-fit: contain;
      border-radius: 12px;
      box-shadow: 0 0 40px rgba(0,0,0,0.9);
    }
    .lightbox-close {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 2.5rem;
      color: white;
      cursor: pointer;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="logo">🜂 Obsidian Dream</div>
      <div class="subtitle">нейро-генератор NSFW</div>
    </div>

    <div class="input-group">
      <input type="text" class="prompt-input" id="promptInput" placeholder="Опишите изображение... например: девушка с тату, неоновый свет, киберпанк" autofocus>
      <button class="generate-btn" id="generateBtn">✨ Создать</button>
    </div>

    <div class="result-area" id="resultArea">
      <div class="placeholder" id="placeholder">Введите запрос и нажмите «Создать»</div>
      <div class="loading-spinner" id="loadingSpinner" style="display:none;">
        <div class="spinner"></div>
        <span>Генерация...</span>
      </div>
      <img id="resultImage" src="" alt="Результат" style="display:none;">
    </div>

    <div class="action-buttons" id="actionButtons" style="display:none;">
      <button class="icon-btn" id="downloadBtn">⬇️ Скачать</button>
      <button class="icon-btn" id="fullscreenBtn">🔍 Во весь экран</button>
      <button class="icon-btn" id="saveToHistoryBtn">💾 В историю</button>
    </div>

    <div class="history" id="historySection">
      <div class="history-title">
        <span>🕒 Недавние генерации</span>
        <button class="clear-btn" id="clearHistoryBtn">очистить</button>
      </div>
      <div class="history-grid" id="historyGrid"></div>
    </div>
  </div>

  <!-- Полноэкранный просмотр -->
  <div class="lightbox" id="lightbox">
    <span class="lightbox-close" id="closeLightbox">&times;</span>
    <img id="lightboxImage" src="" alt="Полноэкранный просмотр">
  </div>

  <script>
  (() => {
    const promptInput = document.getElementById('promptInput');
    const generateBtn = document.getElementById('generateBtn');
    const resultArea = document.getElementById('resultArea');
    const placeholder = document.getElementById('placeholder');
    const loadingSpinner = document.getElementById('loadingSpinner');
    const resultImage = document.getElementById('resultImage');
    const actionButtons = document.getElementById('actionButtons');
    const downloadBtn = document.getElementById('downloadBtn');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const saveToHistoryBtn = document.getElementById('saveToHistoryBtn');
    const historyGrid = document.getElementById('historyGrid');
    const clearHistoryBtn = document.getElementById('clearHistoryBtn');
    const lightbox = document.getElementById('lightbox');
    const lightboxImage = document.getElementById('lightboxImage');
    const closeLightbox = document.getElementById('closeLightbox');

    const HISTORY_KEY = 'obsidian_dream_history_v2';
    let history = [];

    // Загрузка истории
    try {
      const saved = localStorage.getItem(HISTORY_KEY);
      if (saved) history = JSON.parse(saved);
    } catch (e) { history = []; }
    renderHistory();

    function saveHistory() {
      localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
      renderHistory();
    }

    function renderHistory() {
      historyGrid.innerHTML = '';
      history.slice(0, 20).forEach(item => {
        const img = document.createElement('img');
        img.src = item.url;
        img.title = item.prompt;
        img.className = 'history-thumb';
        img.onclick = () => {
          setResultImage(item.url);
        };
        historyGrid.appendChild(img);
      });
    }

    function setResultImage(url) {
      resultImage.src = url;
      resultImage.style.display = 'block';
      placeholder.style.display = 'none';
      loadingSpinner.style.display = 'none';
      actionButtons.style.display = 'flex';
    }

    async function generateImage(prompt) {
      const seed = Math.floor(Math.random() * 1000000);
      const encodedPrompt = encodeURIComponent(prompt + ', highly detailed, realistic, NSFW allowed, erotic, beautiful, artistic');
      const width = 512;
      const height = 768;
      const imageUrl = `https://image.pollinations.ai/prompt/${encodedPrompt}?width=${width}&height=${height}&nologo=true&seed=${seed}`;

      placeholder.style.display = 'none';
      resultImage.style.display = 'none';
      loadingSpinner.style.display = 'flex';
      actionButtons.style.display = 'none';

      try {
        const img = new Image();
        img.src = imageUrl;
        await new Promise((resolve, reject) => {
          img.onload = resolve;
          img.onerror = reject;
          setTimeout(() => reject(new Error('Timeout')), 30000);
        });

        setResultImage(imageUrl);
        addToHistory(imageUrl, prompt);
      } catch (e) {
        alert('Не удалось сгенерировать изображение. Попробуйте другой запрос или повторите позже.');
        placeholder.style.display = 'block';
        loadingSpinner.style.display = 'none';
      }
    }

    function addToHistory(url, prompt) {
      if (history.length > 0 && history[0].url === url) return;
      history.unshift({ url, prompt, date: Date.now() });
      if (history.length > 50) history.pop();
      saveHistory();
    }

    generateBtn.addEventListener('click', () => {
      const prompt = promptInput.value.trim();
      if (!prompt) {
        alert('Введите описание изображения.');
        return;
      }
      generateImage(prompt);
    });

    promptInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') generateBtn.click();
    });

    downloadBtn.addEventListener('click', () => {
      const url = resultImage.src;
      if (!url) return;
      const a = document.createElement('a');
      a.href = url;
      a.download = 'obsidian-dream-' + Date.now() + '.jpg';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    });

    fullscreenBtn.addEventListener('click', () => {
      const url = resultImage.src;
      if (!url) return;
      lightboxImage.src = url;
      lightbox.style.display = 'flex';
    });

    closeLightbox.addEventListener('click', () => {
      lightbox.style.display = 'none';
    });
    lightbox.addEventListener('click', (e) => {
      if (e.target === lightbox) lightbox.style.display = 'none';
    });

    saveToHistoryBtn.addEventListener('click', () => {
      addToHistory(resultImage.src, promptInput.value || 'без названия');
    });

    clearHistoryBtn.addEventListener('click', () => {
      if (confirm('Очистить всю историю генераций?')) {
        history = [];
        saveHistory();
      }
    });
  })();
  </script>
</body>
</html>
