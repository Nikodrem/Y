<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>🌊 Elysian — бесконечная галерея</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f2f0;
      --surface: rgba(255,255,255,0.7);
      --text: #1a1a1a;
      --muted: #7a7a7a;
      --accent: #d68c6a;
      --accent2: #8c6a5a;
      --shadow: 0 8px 24px rgba(0,0,0,0.08);
      --radius: 20px;
      --transition: 0.25s ease;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--bg);
      font-family: 'Plus Jakarta Sans', sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .app-wrapper {
      width: 100%;
      max-width: 1200px;
      padding: 1rem 1rem 4rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    /* Заголовок */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .logo {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .controls {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
    }
    .pill-btn {
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(0,0,0,0.05);
      padding: 0.5rem 1.2rem;
      border-radius: 30px;
      font-weight: 500;
      font-size: 0.9rem;
      cursor: pointer;
      transition: var(--transition);
      color: var(--text);
    }
    .pill-btn.active, .pill-btn:hover {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    .search-input {
      padding: 0.5rem 1rem;
      border-radius: 20px;
      border: 1px solid rgba(0,0,0,0.08);
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(8px);
      font-size: 0.9rem;
      outline: none;
      min-width: 150px;
    }
    .search-input:focus {
      border-color: var(--accent);
    }

    /* Masonry сетка */
    .masonry {
      columns: 4 240px;
      column-gap: 1rem;
    }
    @media (max-width: 800px) {
      .masonry { columns: 2 180px; }
    }

    .gallery-item {
      break-inside: avoid;
      margin-bottom: 1rem;
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--surface);
      backdrop-filter: blur(12px);
      box-shadow: var(--shadow);
      transition: transform var(--transition), box-shadow var(--transition);
      cursor: pointer;
      position: relative;
    }
    .gallery-item:hover {
      transform: translateY(-6px);
      box-shadow: 0 16px 32px rgba(0,0,0,0.12);
    }
    .gallery-item img, .gallery-item video {
      width: 100%;
      display: block;
      object-fit: cover;
    }
    .item-info {
      padding: 0.6rem 0.8rem;
      font-size: 0.8rem;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .like-btn-mini {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1rem;
      transition: 0.2s;
    }
    .like-btn-mini.liked { color: #e05a5a; }

    .loader-sentinel {
      height: 1px;
    }

    /* Полноэкранный просмотр */
    .lightbox {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(16px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .lightbox.open { opacity:1; pointer-events: auto; }
    .lightbox-content {
      max-width: 90vw;
      max-height: 90vh;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .lightbox-content img, .lightbox-content video {
      max-width: 90vw;
      max-height: 90vh;
      border-radius: 16px;
      box-shadow: 0 0 30px rgba(0,0,0,0.8);
    }
    .close-lightbox {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 2.5rem;
      color: white;
      cursor: pointer;
      z-index: 10;
      background: none;
      border: none;
    }
    .lightbox-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 3rem;
      color: white;
      cursor: pointer;
      background: rgba(0,0,0,0.5);
      border-radius: 50%;
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
    }
    .lightbox-nav.prev { left: 10px; }
    .lightbox-nav.next { right: 10px; }

    .to-top {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 44px;
      height: 44px;
      background: var(--accent);
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s;
      cursor: pointer;
      z-index: 20;
    }
    .to-top.visible { opacity: 1; }
  </style>
</head>
<body>
<div class="app-wrapper">
  <header>
    <div class="logo">🌊 Elysian</div>
    <div class="controls">
      <input type="text" class="search-input" id="searchInput" placeholder="Поиск...">
      <button class="pill-btn active" data-cat="all">Всё</button>
      <button class="pill-btn" data-cat="portraits">Портреты</button>
      <button class="pill-btn" data-cat="art">Арт</button>
      <button class="pill-btn" data-cat="erotica">Эротика</button>
      <button class="pill-btn" data-cat="video">Видео</button>
    </div>
  </header>

  <div class="masonry" id="masonryGrid"></div>
  <div class="loader-sentinel" id="sentinel"></div>
</div>

<!-- Лайтбокс -->
<div class="lightbox" id="lightbox">
  <button class="close-lightbox" id="closeLightbox">&times;</button>
  <div class="lightbox-content" id="lightboxContent"></div>
  <div class="lightbox-nav prev" id="prevBtn">‹</div>
  <div class="lightbox-nav next" id="nextBtn">›</div>
</div>
<div class="to-top" id="toTopBtn">↑</div>

<script>
(() => {
  // Сабреддиты для разных категорий
  const CATEGORIES = {
    portraits: ['gentlemanboners','classysexy','PrettyGirlsNSFW','TotalBabes','BeautifulWomen','Nude_Selfie'],
    art: ['ArtGW','Boudoir','FineArtNudes','ElegantNudes','TheArtOfTheTease','EroticArt','ArtisticNudes'],
    erotica: ['GoneWild','RealGirls','PetiteGoneWild','AltGirls','gothsluts','onoff','lingerie','holdthemoan'],
    video: ['60fpsporn','porninfifteenseconds','nsfw_gif','adultgifs','pornvids','cumsluts']
  };
  const ALL_SUBS = Object.values(CATEGORIES).flat();

  const BLOCKLIST = /(gore|blood|murder|death|kill|violen|убийств|смерт|насил|труп|femboy|trap|trans|shemale|фембой|транс)/i;

  let state = {
    seenPosts: new Set(),
    seenUrls: new Set(),
    galleryItems: [],
    currentCat: 'all',
    lightboxIndex: 0,
  };

  try {
    const raw = localStorage.getItem('elysian_state');
    if(raw) {
      const s = JSON.parse(raw);
      if(s.seenPosts) state.seenPosts = new Set(s.seenPosts);
      if(s.seenUrls) state.seenUrls = new Set(s.seenUrls);
    }
  } catch(e){}

  function saveState() {
    localStorage.setItem('elysian_state', JSON.stringify({
      seenPosts: Array.from(state.seenPosts).slice(-2000),
      seenUrls: Array.from(state.seenUrls).slice(-2000),
    }));
  }

  // JSONP
  function jsonp(url, cb, timeout=8000) {
    return new Promise((resolve, reject) => {
      const bases = ['https://www.reddit.com','https://old.reddit.com'];
      let attempt = 0;
      const tryLoad = () => {
        if(attempt >= bases.length) return reject(new Error('JSONP fail'));
        const base = bases[attempt];
        const script = document.createElement('script');
        const full = base + url + (url.includes('?')?'&':'?')+'jsonp='+cb+'&_='+Date.now();
        const timer = setTimeout(() => { cleanup(); attempt++; tryLoad(); }, timeout);
        function cleanup() { clearTimeout(timer); delete window[cb]; if(script.parentNode) script.parentNode.removeChild(script); }
        window[cb] = (data) => { cleanup(); resolve(data); };
        script.onerror = () => { cleanup(); attempt++; tryLoad(); };
        script.src = full;
        document.head.appendChild(script);
      };
      tryLoad();
    });
  }

  async function fetchSubreddit(sub, limit=10) {
    const data = await jsonp(`/r/${sub}/hot.json?limit=${limit}`, 'galleryCB');
    return data.data.children;
  }

  function processPost(post) {
    const data = post.data;
    if(!data || data.stickied) return null;
    if(state.seenPosts.has(data.id) || (data.url && state.seenUrls.has(data.url))) return null;
    if(BLOCKLIST.test(data.title+' '+data.subreddit)) return null;
    state.seenPosts.add(data.id);
    if(data.url) state.seenUrls.add(data.url);
    let type = 'image', mediaUrl = data.url, poster = null;
    if(data.is_video && data.media?.reddit_video?.fallback_url) {
      type = 'video';
      mediaUrl = data.media.reddit_video.fallback_url;
      poster = (data.thumbnail && data.thumbnail !== 'self') ? data.thumbnail : '';
    } else if(data.domain === 'redgifs.com') {
      const m = data.url.match(/\/watch\/([a-zA-Z0-9]+)/);
      if(m) { type = 'iframe'; mediaUrl = `https://www.redgifs.com/ifr/${m[1]}`; }
    } else if(data.url?.match(/\.(mp4|webm|mov)$/i) || data.url?.endsWith('.gifv')) {
      type = 'video';
      mediaUrl = data.url.replace('.gifv','.mp4');
    } else if(data.url?.match(/\.(jpg|jpeg|png|gif|webp)$/i) || data.domain === 'i.redd.it' || data.domain === 'i.imgur.com') {
      type = 'image';
    } else return null;
    return { id: data.id, title: data.title, subreddit: data.subreddit, type, mediaUrl, poster };
  }

  // Рендер элемента галереи
  function createGalleryItem(item) {
    const div = document.createElement('div');
    div.className = 'gallery-item';
    div.dataset.index = state.galleryItems.length;
    let media;
    if(item.type === 'image') {
      media = document.createElement('img');
      media.src = item.mediaUrl;
      media.loading = 'lazy';
    } else if(item.type === 'video') {
      media = document.createElement('video');
      media.src = item.mediaUrl;
      if(item.poster) media.poster = item.poster;
      media.muted = true;
      media.loop = true;
      media.playsInline = true;
      media.preload = 'metadata';
    } else if(item.type === 'iframe') {
      media = document.createElement('img');
      media.src = 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="150"><rect fill="%23ddd" width="200" height="150"/><text fill="%23999" x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-size="20">▶</text></svg>';
    }
    div.appendChild(media);
    const info = document.createElement('div');
    info.className = 'item-info';
    info.innerHTML = `<span>${item.title?.slice(0,30) || 'r/'+item.subreddit}</span><button class="like-btn-mini">♡</button>`;
    div.appendChild(info);
    div.addEventListener('click', (e) => {
      if(e.target.classList.contains('like-btn-mini')) {
        e.stopPropagation();
        e.target.classList.toggle('liked');
        return;
      }
      openLightbox(parseInt(div.dataset.index));
    });
    return div;
  }

  // Загрузка контента для категории
  async function loadMoreContent() {
    const subs = state.currentCat === 'all' ? ALL_SUBS : CATEGORIES[state.currentCat] || ALL_SUBS;
    const randomSub = subs[Math.floor(Math.random()*subs.length)];
    try {
      const posts = await fetchSubreddit(randomSub, 6);
      const newItems = posts.map(processPost).filter(Boolean);
      state.galleryItems.push(...newItems);
      const fragment = document.createDocumentFragment();
      newItems.forEach(item => {
        const el = createGalleryItem(item);
        fragment.appendChild(el);
      });
      document.getElementById('masonryGrid').appendChild(fragment);
      saveState();
    } catch(e) {}
  }

  // Бесконечный скролл
  const sentinel = document.getElementById('sentinel');
  const observer = new IntersectionObserver(entries => {
    if(entries[0].isIntersecting) loadMoreContent();
  }, { rootMargin: '800px' });
  observer.observe(sentinel);

  // Категории
  document.querySelectorAll('.pill-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.pill-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.currentCat = btn.dataset.cat;
      state.galleryItems = [];
      document.getElementById('masonryGrid').innerHTML = '';
      loadMoreContent();
    });
  });

  // Поиск (упрощённый)
  document.getElementById('searchInput').addEventListener('keypress', (e) => {
    if(e.key === 'Enter') {
      const query = e.target.value.trim().toLowerCase();
      if(query) {
        state.currentCat = 'all';
        state.galleryItems = [];
        document.getElementById('masonryGrid').innerHTML = '';
        // временно фильтруем загружаемое
        const originalFetch = fetchSubreddit;
        fetchSubreddit = async (sub, limit) => {
          const posts = await originalFetch(sub, limit);
          posts.data.children = posts.data.children.filter(p => p.data.title?.toLowerCase().includes(query));
          return posts;
        };
        loadMoreContent().then(() => { fetchSubreddit = originalFetch; });
      }
    }
  });

  // Лайтбокс
  const lightbox = document.getElementById('lightbox');
  const lightboxContent = document.getElementById('lightboxContent');
  function openLightbox(index) {
    state.lightboxIndex = index;
    lightbox.classList.add('open');
    showLightboxMedia();
  }
  function closeLightbox() {
    lightbox.classList.remove('open');
    lightboxContent.innerHTML = '';
  }
  function showLightboxMedia() {
    const item = state.galleryItems[state.lightboxIndex];
    if(!item) return;
    lightboxContent.innerHTML = '';
    if(item.type === 'image') {
      const img = document.createElement('img');
      img.src = item.mediaUrl;
      lightboxContent.appendChild(img);
    } else if(item.type === 'video') {
      const video = document.createElement('video');
      video.src = item.mediaUrl;
      video.controls = true;
      video.autoplay = true;
      video.playsInline = true;
      lightboxContent.appendChild(video);
    } else if(item.type === 'iframe') {
      const iframe = document.createElement('iframe');
      iframe.src = item.mediaUrl;
      iframe.allowFullscreen = true;
      iframe.style.width = '80vw';
      iframe.style.height = '80vh';
      lightboxContent.appendChild(iframe);
    }
  }
  document.getElementById('closeLightbox').addEventListener('click', closeLightbox);
  document.getElementById('prevBtn').addEventListener('click', () => {
    if(state.lightboxIndex > 0) {
      state.lightboxIndex--;
      showLightboxMedia();
    }
  });
  document.getElementById('nextBtn').addEventListener('click', () => {
    if(state.lightboxIndex < state.galleryItems.length-1) {
      state.lightboxIndex++;
      showLightboxMedia();
    }
  });
  lightbox.addEventListener('click', (e) => {
    if(e.target === lightbox) closeLightbox();
  });

  // Кнопка наверх
  window.addEventListener('scroll', () => {
    document.getElementById('toTopBtn').classList.toggle('visible', scrollY > 500);
  });
  document.getElementById('toTopBtn').addEventListener('click', () => window.scrollTo({top:0, behavior:'smooth'}));

  // Старт
  loadMoreContent();
})();
</script>
</body>
</html>
