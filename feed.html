<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>🜂 Obsidian Dream — NSFW AI Генератор</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121c;
      --accent: #b44bff;
      --accent2: #ff4d7a;
      --text: #e0e0f0;
      --muted: #6b6b80;
      --radius: 16px;
      --shadow: 0 0 30px rgba(180, 75, 255, 0.3);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .app {
      max-width: 600px;
      width: 100%;
      background: var(--surface);
      border-radius: 24px;
      padding: 2rem 1.5rem;
      box-shadow: var(--shadow), 0 8px 24px rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.08);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }
    .logo {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: 2px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 8px rgba(180,75,255,0.5));
    }
    .subtitle {
      font-size: 0.9rem;
      color: var(--muted);
      margin-top: -0.8rem;
    }

    .input-group {
      display: flex;
      width: 100%;
      gap: 0.5rem;
    }
    .prompt-input {
      flex: 1;
      padding: 0.9rem 1.2rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 30px;
      color: white;
      font-size: 1rem;
      outline: none;
      transition: 0.3s;
    }
    .prompt-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 12px rgba(180,75,255,0.2);
    }
    .generate-btn {
      padding: 0.9rem 1.8rem;
      background: var(--accent);
      border: none;
      border-radius: 30px;
      color: white;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      box-shadow: 0 4px 15px rgba(180,75,255,0.4);
    }
    .generate-btn:hover {
      background: #c56bff;
      box-shadow: 0 6px 20px rgba(180,75,255,0.6);
    }
    .generate-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      box-shadow: none;
    }

    .result-area {
      width: 100%;
      position: relative;
      min-height: 300px;
      background: rgba(0,0,0,0.3);
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px dashed rgba(255,255,255,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .result-area img {
      width: 100%;
      height: auto;
      display: block;
    }
    .placeholder {
      color: var(--muted);
      text-align: center;
      padding: 2rem;
    }
    .loading-spinner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .action-buttons {
      display: flex;
      gap: 0.8rem;
      margin-top: 0.5rem;
    }
    .icon-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text);
      padding: 0.6rem 1.2rem;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: 0.2s;
    }
    .icon-btn:hover { background: rgba(255,255,255,0.12); }

    .history {
      width: 100%;
      margin-top: 1rem;
    }
    .history-title {
      font-weight: 600;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .history-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      max-height: 200px;
      overflow-y: auto;
    }
    .history-thumb {
      width: 80px;
      height: 80px;
      border-radius: 8px;
      object-fit: cover;
      cursor: pointer;
      transition: 0.2s;
      border: 1px solid transparent;
    }
    .history-thumb:hover {
      border-color: var(--accent);
      transform: scale(1.05);
    }

    .clear-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="logo">🜂 Obsidian Dream</div>
    <div class="subtitle">нейро-генератор NSFW</div>

    <div class="input-group">
      <input type="text" class="prompt-input" id="promptInput" placeholder="Опишите изображение... например: девушка с тату, неоновый свет, киберпанк" autofocus>
      <button class="generate-btn" id="generateBtn">✨ Создать</button>
    </div>

    <div class="result-area" id="resultArea">
      <div class="placeholder" id="placeholder">Введите запрос и нажмите «Создать»</div>
      <div class="loading-spinner" id="loadingSpinner" style="display:none;">
        <div class="spinner"></div>
        <span>Генерация...</span>
      </div>
      <img id="resultImage" src="" alt="Результат" style="display:none;">
    </div>

    <div class="action-buttons" id="actionButtons" style="display:none;">
      <button class="icon-btn" id="downloadBtn">⬇️ Скачать</button>
      <button class="icon-btn" id="fullscreenBtn">🔍 Во весь экран</button>
      <button class="icon-btn" id="saveToHistoryBtn">💾 В историю</button>
    </div>

    <div class="history" id="historySection">
      <div class="history-title">
        <span>🕒 Недавние генерации</span>
        <button class="clear-btn" id="clearHistoryBtn">очистить</button>
      </div>
      <div class="history-grid" id="historyGrid"></div>
    </div>
  </div>

  <!-- Полноэкранный просмотр -->
  <div id="lightbox" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:100; align-items:center; justify-content:center;" onclick="this.style.display='none'">
    <img id="lightboxImage" src="" style="max-width:95vw; max-height:95vh; object-fit:contain; border-radius:8px; box-shadow:0 0 30px rgba(0,0,0,0.8);">
    <span style="position:absolute; top:20px; right:30px; font-size:2.5rem; color:white; cursor:pointer;" onclick="document.getElementById('lightbox').style.display='none'">&times;</span>
  </div>

  <script>
  (() => {
    const promptInput = document.getElementById('promptInput');
    const generateBtn = document.getElementById('generateBtn');
    const resultArea = document.getElementById('resultArea');
    const placeholder = document.getElementById('placeholder');
    const loadingSpinner = document.getElementById('loadingSpinner');
    const resultImage = document.getElementById('resultImage');
    const actionButtons = document.getElementById('actionButtons');
    const downloadBtn = document.getElementById('downloadBtn');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const saveToHistoryBtn = document.getElementById('saveToHistoryBtn');
    const historyGrid = document.getElementById('historyGrid');
    const clearHistoryBtn = document.getElementById('clearHistoryBtn');
    const lightbox = document.getElementById('lightbox');
    const lightboxImage = document.getElementById('lightboxImage');

    const HISTORY_KEY = 'obsidian_dream_history';
    let history = [];

    // Загружаем историю
    try {
      const saved = localStorage.getItem(HISTORY_KEY);
      if(saved) history = JSON.parse(saved);
    } catch(e) { history = []; }
    renderHistory();

    // Сохраняем историю
    function saveHistory() {
      localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
      renderHistory();
    }

    function renderHistory() {
      historyGrid.innerHTML = '';
      history.slice(0, 20).forEach(item => {
        const img = document.createElement('img');
        img.src = item.url;
        img.title = item.prompt;
        img.className = 'history-thumb';
        img.onclick = () => {
          setResultImage(item.url);
        };
        historyGrid.appendChild(img);
      });
    }

    function setResultImage(url) {
      resultImage.src = url;
      resultImage.style.display = 'block';
      placeholder.style.display = 'none';
      loadingSpinner.style.display = 'none';
      actionButtons.style.display = 'flex';
    }

    async function generateImage(prompt) {
      // Формируем URL для Pollinations.ai
      const seed = Math.floor(Math.random() * 1000000);
      const encodedPrompt = encodeURIComponent(prompt + ', highly detailed, realistic, NSFW allowed, erotic, beautiful, artistic');
      const width = 512;
      const height = 768;
      const imageUrl = `https://image.pollinations.ai/prompt/${encodedPrompt}?width=${width}&height=${height}&nologo=true&seed=${seed}`;

      // Показываем загрузку
      placeholder.style.display = 'none';
      resultImage.style.display = 'none';
      loadingSpinner.style.display = 'flex';
      actionButtons.style.display = 'none';

      try {
        // Ждём загрузки изображения
        const img = new Image();
        img.src = imageUrl;
        await new Promise((resolve, reject) => {
          img.onload = resolve;
          img.onerror = reject;
          setTimeout(() => reject(new Error('Timeout')), 30000);
        });

        setResultImage(imageUrl);
        // Автоматически добавляем в историю
        addToHistory(imageUrl, prompt);
      } catch (e) {
        alert('Не удалось сгенерировать изображение. Попробуйте другой запрос или повторите позже.');
        placeholder.style.display = 'block';
        loadingSpinner.style.display = 'none';
      }
    }

    function addToHistory(url, prompt) {
      // Не добавляем дубликаты подряд
      if(history.length > 0 && history[0].url === url) return;
      history.unshift({ url, prompt, date: Date.now() });
      // Ограничим историю 50 записями
      if(history.length > 50) history.pop();
      saveHistory();
    }

    generateBtn.addEventListener('click', () => {
      const prompt = promptInput.value.trim();
      if(!prompt) {
        alert('Введите описание изображения.');
        return;
      }
      generateImage(prompt);
    });

    promptInput.addEventListener('keypress', (e) => {
      if(e.key === 'Enter') generateBtn.click();
    });

    downloadBtn.addEventListener('click', () => {
      const url = resultImage.src;
      if(!url) return;
      // Скачивание через ссылку
      const a = document.createElement('a');
      a.href = url;
      a.download = 'obsidian-dream-' + Date.now() + '.jpg';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    });

    fullscreenBtn.addEventListener('click', () => {
      const url = resultImage.src;
      if(!url) return;
      lightboxImage.src = url;
      lightbox.style.display = 'flex';
    });

    saveToHistoryBtn.addEventListener('click', () => {
      addToHistory(resultImage.src, promptInput.value || 'без названия');
    });

    clearHistoryBtn.addEventListener('click', () => {
      if(confirm('Очистить всю историю генераций?')) {
        history = [];
        saveHistory();
      }
    });

    // Поддержка drag & drop? Необязательно. Оставим базовый функционал.
  })();
  </script>
</body>
</html>
